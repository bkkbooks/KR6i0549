body:
  text: 隋外國沙門菩提登譯古吳蕅益沙門智旭疏二示進趣義二初問二答今初爾時堅淨信菩薩摩訶薩問地藏菩薩摩訶薩言云何開示求向大乘者進趣方便上來已為末世鈍根巧設除疑轉障之法然而障轉疑除之後正可進趣大乘欲趣大乘必假方便故今特問之也二答為二初略示二詳明今初地藏菩薩摩訶薩言善男子若有眾生欲向大乘者應當先知最初所行根本之業其最初所行根本業者所謂依止一實境界以修信解因修信解力增長故速疾得入菩薩種性最初所行根本之業即大佛頂經所謂最初方便也一實境界謂如來藏自性清淨心惟一實相更無他物即大佛頂經所謂陰入處界七大本如來藏妙真如性也依此不生不滅為本修因然後圓成果地修證中間永無諸委曲相故能速入菩薩種性二詳明三初示一實境界以開圓解二示二種觀道以顯圓行三示三忍四佛以彰圓位初中三初標起二廣釋三總結今初所言一實境界者二廣釋三初明體二明相三明藏即體相用三大意也體即法身正因佛性相即般若了因佛性藏即解脫緣因佛性體亦即空假中不可思議相亦即空假中不可思議藏亦即空假中不可思議故云舉一即三言三即一非一非三而一而三不縱不橫不並不別是為一實境界也又初明體即同起信心真如門二明相三明藏即同起信心生滅門初明體二初顯真二會妄真外無妄故須顯真妄外無真故須會妄真妄不二乃為一實境界初顯真又三初顯性體二顯性量三顯性具體即體大量即相大具即用大即一而三即三而一此之謂也初顯性體謂眾生心體從本以來不生不滅自性清淨無障無礙猶如虗空離分別故眾生指十法界一切有情也十界眾生同一心體迷之而為蜎飛蠕動心體無減悟之而為諸佛菩薩心體無增以一切十界從來無有二心惟是一心真體又一一含生即具心之全體非是心之少分良由心體絕待不可割裂無有方隅不思議故譬如日光徧照一切隙中一一隙中皆見日之全體大用非是日之少分又一剎那中所見日光即是亘古亘今日光除此現前日光之外更無過去未來日光可別貯積何處夫日光僅是色法尚爾不可思議況一心靈妙而不爾耶又如人世歲朝則普天下人同增一歲秖一歲朝人人各得其全不可分此一歲以為多分使天下人各得少分又不可謂天下之人各增一歲遂使共成多多歲朝夫歲時僅是假法尚爾不可思議況一心實體而不爾耶是故不論昏迷倒惑蠢動含靈現前一念心體無不從本以來不生不滅乃至離分別故非待成佛之後方證不生不滅乃至離分別也從本不生不滅者譬如瞖目見空中華華即是空故有瞖時華本不生縱瞖盡時華本不滅以無實華可滅故也眾生于無生滅中妄見生滅生實不生滅實不滅也從本自性清淨者譬如煙霧騰於虗空虗空之性原無垢染眾生於清淨中妄見垢染垢染自性恒清淨也從本無障無礙者譬如方圓器妄現方圓空空體原無方圓眾生於無障礙體中妄見障礙障礙即無障礙也猶如虗空離分別故者譬如虗空離四句絕百非不可謂有不可謂無無分際無動搖無形質無方隅無彼此無內外無生無滅無垢無淨無在無不在離諸戲論不可分別一切眾生現前一念心性亦如是也此是直指現前一念昏迷倒惑心體本來如此故云一切眾生皆證圓覺又云如來成正覺時悉見一切眾生成正覺也如此方是直指人心見性成佛若離現前一念別談真心何異離波覓水耶二顯性量平等普徧無所不至圓滿十方究竟一相無二無別不變不異無增無減此直指眾生現前一念心體從來豎窮橫徧不可區局也現前一念雖復覓之了不可得而徧知一切根身器界無有遺餘譬如眼光曉了前境其光圓滿得無憎愛故云平等普徧無所不至圓滿十方也又知色之時知非是色知聲之時知非是聲知香之時知非是香知味之時知非是味知觸之時知非是觸知法之時知非是法故云究竟一相也又色聲香味觸法無是知者無非知者不可分析不可指陳故云無二無別也又髮白面皺知體無皺六塵遷滅知體無遷故云不遷不異也又徧緣法界知體不舒清心戶堂知體不縮故云無增無減也三顯性具以一切眾生心一切聲聞辟支佛心一切菩薩心一切諸佛心皆同不生不滅無染無淨真如相故此直指現前一念心體法爾具足十法界也一切眾生即六凡法界并聲聞辟支菩薩諸佛如此十界皆同現前一念不生不滅無染無淨真如相故除此現前一念心體之外更無十法界心可得是故若約諸佛則餘九界皆是佛心中之九界九界無非佛心所具若約地獄則餘九界亦皆地獄心中九界九界無非地獄心中所具中間八界並可例知譬如一室而有十燈隨一燈光必能徧攝餘九燈光同為一光互在互融也又一界既具九界則彼九界法爾亦必還各互具便是百界每界各論十如便是千如約五陰實法亦具千如約眾生假名亦具千如約依報國土亦具千如便是三千性相總不離現前一念心體也譬如一隙中之日光頓攝日輪全體則必徧攝百千隙中日輪全體同歸此一隙中亦必將彼一一隙中日輪所有徧照百千隙之功能同歸此一隙中又必將彼過去未來一一剎那所有徧照徧在全體功能並同歸此一隙一剎那中斷斷不可分剖無有分劑故也初顯真竟二會妄三初會妄即空二會妄即假三會妄即中空則無非性量假則無非性具中則無非性體前顯真時則真該妄末今會妄時則妄徹真源真該妄末故一實無非境界妄徹真源故境界無非一實也初會妄即空又二初明覺知空二明境界空即五蘊本空也今初所以者何一切有心起分別者猶如幻化無有真實所謂識受想行憶念緣慮覺知等法種種心數非青非黃非赤非白亦非雜色無有長短方圓大小乃至盡於十方虗空一切世界求心形狀無一區分而可得者但以眾生無明癡暗熏習因緣現妄境界令生念著所謂此心不能自知妄自謂有起覺知想計我我所而實無有覺知之相以此妄心畢竟無體不可見故識即八識心王受想即徧行五數之二行即指餘四十九心數法此等心心數法雖有憶念緣慮覺知而非顯色故非青黃赤白雜色亦非形色故無長短方圓大小亦非內外中間諸處故無形狀區分可得是則但有覺知之名實無覺知之相畢竟無體覓之了不可得如波以水為體別無自體也大佛頂經七處徵心正欲顯此妄心無體若達無體必不悞認所推影子以為能推矣二明境界空若無覺知能分別者則無十方三世一切境界差別之相前云熏習因緣現妄境界是由心生故種種法生也又云令生念著是由法生故種種心生也然境界猶似可以指陳妄心畢竟覓不可得是奪心不奪境也今明由分別故妄見境界差別既無覺知能分別者那有境界為所分別如無眼見那得有色如無耳聞那得有聲則是心境俱奪五蘊皆空非待滅而後空也初會妄即空竟二會妄即假又三初依心故境假二依境故心假三重顯唯心今初以一切法皆不能自有但依妄心分別故有所謂一切境界各各不自念為有知此為自知彼為他是故一切法不能自有則無別異唯依妄心不知不了內自無故謂有前外所知境界妄生種種法想謂有謂無謂彼謂此謂是謂非謂好謂惡乃至妄生無量無邊法想當如是知一切諸法皆從妄想生依妄心為本不知不了內自無故者謂妄認四大為自身相妄認六塵緣影為自心相也依此無內之內虗妄分別無外之外而生有無彼此是非好惡種種情謂如是諸法非實有生但從妄想生耳妄想尚不可得況有所生法耶但有假名境界而已二依境故心假然此妄心無自相故亦依境界而有所謂緣念覺知前境界故說名為心此即所謂心本無生因境有也然雖說名為心究竟覓之了不可得以非顯色形色亦非內外中間故也但有假名心心數法而已三重顯唯心又此妄心與前境界雖俱相依起無先後而此妄心能為一切境界源主所以者何謂依妄心不了法界一相故說心有無明依無明力因故現妄境界亦依無明滅故一切境界滅非依一切境界自不了故說境界有無明亦非依境界故生於無明以一切諸佛於一切境界不生無明故又復不依境界滅故無明心滅以一切境界從本已來體性自滅未曾有故因如此義是故但說一切諸法依心為本前明境界依妄心有則是心生法生可名唯心次明妄心依境界有則是法生心生似非唯心之義今故合明雖俱相依仍以心為主也當知境界依妄心有是自證分為增上緣轉成相分妄心依境界有是由相分為所緣緣顯示見分見相二分起必同時故無先後而此妄心總攝見分及內二分同名為心但指相分以為境界見相俱依自證而起是故離心無別境界但說諸法皆依心也問既但唯心何故台宗復云唯色唯香等耶答正以六塵相分依自證起體即是心故唯色唯香仍即唯心不相違也倘計色香別有自體如何能使一切法趣今依一心而有相見種種相見全體是心故可互攝互入互徧互融耳二會妄即假竟三會妄即中又二初就義體會二就緣起會今初當知一切諸法悉名為心以義體不異為心所攝故義不異者同是因緣生法同皆即空即假即中也體不異者同以三德秘藏為體也為心所攝者見相二分皆依自證分起攝末歸本總名唯識唯識即唯心也二就緣起會又一切諸法從心所起與心作相和合而有共生共滅同無有住以一切境界但隨心所緣念念相續故而得住持暫時為有從心所起即依自證分而起相分也與心作相即與見分為親所緣緣也和合而有謂不可分別心境之際畔也共生共滅謂剎那無前後也同無有住謂心境無不初生即滅終不遷至第二念也第二念之心境但與前念相似相續所以似常似一昧者不知妄計為常一耳初明體竟二明相三初標名二別釋三會釋今初如是所說心義者有二種相何等為二一者心內相二者心外相心內相者復有二種云何為二一者真二者妄上明眾生心體體無分別量周橫豎具同十界全妄即空假中不可思議那得論相然以無相無所不相故得有二種相當知二相即皆無相所以名為相大也心內相者實非在內但以自證分及證自證分微妙幽密不可見故故名心之內相心外相者實非在外但以相分及與見分作用顯然世共許故故名心之外相內相外相同名為心則心外更無他物也又于內相分真妄者真即諸心心數四分所依理體亦名實相此真雖徧內外二相以微密故且名為內妄即諸心心數各內二分迷真而起即以真如為體無別自體故名為妄此妄亦無方隅分劑以不可見且名為內也二別釋三初釋真二釋妄三釋外相今初所言真者謂心體本相如如不異清淨圓滿無障無礙微密難見以遍一切處常恒不壞建立生長一切法故上明體中則攝一切生滅同歸真如以真如外無生滅故今明相中則攝一切真如同歸生滅以生滅外無真如故所言真者猶起信論所言覺義也心體本相者即所謂離念相者等虗空界無所不徧法界一相故云如如不異清淨圓滿等也秖此覺義則能攝一切法生一切法故云建立生長一切法也又如如不異即性體圓滿難見即性量建立生長即性具二釋妄所言妄者謂起念分別覺知緣慮憶想等事雖復相續能生一切種種境界而內虗偽無有真實不可見故所言妄者猶起信論所言不覺義也起念即是業相不覺心動說名為業即諸心心數各有內二分也分別覺知緣慮憶想即能見相諸心心數各有見分是也所生一切境界即境界相諸心心數各有相分是也而內虗偽無有真實者依本覺故而有不覺念無自相不離本覺若離覺性則無不覺故此不覺別無真實自體可得見也三釋外相所言心外相者謂一切諸法種種境界等隨有所念境界現前故知有內心及內心差別隨有所念境界現前即依自證分起相分也故知有內心及內心差別即由所緣相分顯示有能緣見分也相分如鏡像見分如鏡光故名心之外相非謂在心外也自證分如鏡面證自證分如鏡背故名心之內相非謂在心內也譬如鏡面鏡背以銅為體別無自體故名為妄本覺真如譬如鏡銅故名為真以真收妄則若背若面若光若像無非是銅即生滅門是真如門依真起妄則秖此一銅為背為面為光為像即真如門是生滅門約相分別則銅及背面皆屬于體故名內相光之與像皆屬于用故名外相也二別釋竟三會釋二初直會外歸內二就外相會理今初如是當知內妄相者為因為體外妄相者為果為用依如此等義是故我說一切諸法悉名為心因果體用統惟一心心外無法即顯此心無外之相名為相大也二就外相會理又三初會性體二會性量三會性具今初又復當知心外相者如夢所見種種境界唯心想作無實外事一切境界悉亦如是以皆依無明識夢所見妄想作故復次應知內心念念不住故所見所緣一切境界亦隨心念念不住所謂心生故種種法生心滅故種種法滅是生滅相但有名字實不可得以心不往至於境界境界亦不來至於心如鏡中像無來無去是故一切法求生滅定相了不可得所謂一切法畢竟無體本來常空實不生滅故一切眾生恒迷外相不達惟心所以更須會歸一理也如夢所見下是立喻一切境界下是法合復次應知下重明境界實不生滅心生故種種法生則但是心生非別有法而得生也心滅故種種法滅則但是心滅非別有法而可滅也故曰諸法從本來常自寂滅相又曰是法住法位世間相常住如鏡中像體秖是銅生何曾生滅何曾滅耶二會性量如是一切法實不生滅者則無一切境界差別之相寂靜一味名為真如第一義諦自性清淨心彼自性清淨心湛然圓滿以無分別相故假如眼所見之一色鼻所嗅之一香此色此香實不生滅既不生滅則無差別即是寂靜一味即是真如第一義諦即自湛然圓滿故云一色一香無非中道也中道體無分劑擴同太空故名性量色香既爾法法皆然三會性具無分別相者於一切處無所不在無所不在者以能依持建立一切法故假如一色一香擴同太空無分別相則必無所不在普能依持建立一切諸法故云一切法趣色是趣不過一切法趣香是趣不過也依持建立故名性具色香既爾法法亦然夫一切法實不生滅則因緣即中一切法無分別相則因緣即空一切法皆能依持建立一切諸法則因緣即假相分尚爾況見分耶況自證分證自證分耶諸心心數四分之相同是一實境界之相明矣二明相竟三明藏三初就佛界明妙用二就佛界明具九三就迷悟明十界今初復次彼心名如來藏所謂具足無量無邊不可思議無漏清淨功德之業以諸佛法身從無始本際來無障無礙自在不滅一切現化種種功業恒常熾然未曾休息所謂遍一切世界皆示作業種種化益故以一佛身即是一切諸佛身一切諸佛身即是一佛身所有作業亦皆共一所謂無分別相不念彼此平等無二以依一法性而有作業同自然化體無別異故彼心正指眾生現前一念心也眾生現前一念心體具足無漏功德之業即是平等無二如來之藏諸佛證此以為法身不過全證眾生理本此理從無始來相本無障無礙體本自在不滅用本一切現化非俟成佛然後有也但諸眾生雖即同共依此法性由妄分別妄念彼此故于一體橫計別異諸佛已破我法二執斷無明源證此一性故遍一切十方三世所示作業種種化益亦皆共一也二就佛界明具九又三初直明體遍二立喻三法合今初如是諸佛法身遍一切處圓滿不動故隨諸眾生死此生彼恒為作依眾生心體既即諸佛法身法身遍滿不動當知即是眾生心體遍滿不動也但眾生在迷不覺故約諸佛所證以顯法身秖此法身流轉六道名曰眾生設無諸佛法身以為所依何處得有眾生死此生彼二立喻譬如虗空悉能容受一切色像種種形類以一切色像種種形類皆依虗空而有建立生長住虗空中為虗空處所攝以虗空為體無有能出虗空界分者當知色像之中虗空之界不可毀滅色像壞時還歸虗空而虗空本界無增無減不動不變此借虗空以喻諸佛法身借彼色像形類以喻眾生果報煩惱也三法合諸佛法身亦復如是悉能容受一切眾生種種果報以一切眾生種種果報皆依諸佛法身而有建立生長住法身中為法身處所攝以法身為體無有能出法身界分者當知一切眾生身中諸佛法身亦不可毀滅若煩惱斷壞時還歸法身而法身本界無增無減不動不變此以諸佛法身合虗空喻以眾生果報合彼色像形類喻也依法身而建立生長故名即假為法身處所攝故名即空以法身為體故名即中眾生身中法身不可毀滅故原無減煩惱斷時還歸法身故亦無增也由煩惱故妄于法身之中見有種種果報果報似動而法身不動果報似變而法身不變譬如瞖目見空中華華相飛舞似動而空本不動華相生滅似變而空本不變也問曰喻中既云色像壞時還歸虗空今法合應云果報壞時還歸法身胡乃云煩惱斷壞耶答曰果報無體全以法身為體由煩惱故不見果報體即法身若斷煩惱究竟盡時便見身諸毛孔量同虗空遍含塵剎不可思議豈更有果報可壞令其擴同頑空耶問曰設云果報壞時還歸法身亦有何過答曰有過若煩惱未斷則果報壞時復生異熟何能證會法身若煩惱斷時則幻化空身本即法身何俟更壞果報問曰此則法喻有不齊過答曰凡言喻者秖是少分相似如雪山喻象豈可責其尾牙滿月喻面豈可求其眉目今以虗空而喻法身豈可責其靈知寂照當知眾生現前一念心體即是諸佛所證究竟法身絕待真常不可為喻但由煩惱自覆有而不知故不得已須設眾喻欲明舉體隨緣則喻以如金鑄十界像仍恐迷者謂有造作謂有分劑欲明對至即現則喻以如鏡寫妍醜容仍恐迷者謂有彼此謂有內外欲明迷悟無性則喻以空華起滅冰水互成仍恐迷者謂迷能生悟悟亦生迷欲明智斷不壞則喻以如金出鑛如木成灰仍恐迷者謂一分是常一分無常所以一切言詮皆不能及譬如盲人欲辨乳色聞鶴謂動聞雪謂冷聞粖為軟聞貝謂堅種種憶想終不能見乳之真色圓覺經云雲駛月運舟行岸移未證無為而辨圓覺彼圓覺性即同流轉此之謂也今不得已更助觀心一釋令有智者直下薦取現前一念心體悉能容受一切眾生種種果報以一切眾生種種果報皆依現前一念心體而有建立生長住于現前一念心體之中為現前一念心體所攝以現前一念心體為體無有能出現前一念心體界分者當知一切眾生身中現前一念心體不可毀滅若煩惱斷壞時還證現前一念心體而現前一念心體本界無增無減不動不變思之思之問若果報即是法身不須滅者則煩惱即是般若亦何須斷答若知煩惱即是般若般若現前無復煩惱名煩惱滅乃是非滅非不滅而論滅耳豈真有煩惱實體而可滅耶又問若煩惱非滅非不滅而得論滅則果報亦非滅非不滅何不論滅答煩惱如形果報如影煩惱如聲果報如響煩惱如目瞖果報如空華故但論煩惱滅不須更論果報滅也問以虗空喻諸佛法身幾義相似幾不相似答一無始終二不生滅三無處不遍四包容無外五無障無礙六不可撮摩此是似義一虗空頑然法身真覺二虗空但名法身有體三虗空凝然不變法身舉體隨緣四虗空蕩無一物法身具無邊德五虗空與色為二法身眾生不二六虗空但是心心數之相分法身總攝心心數之四分四分無非法身體故此即不相似也若能了達四分無非法身則此虗空相分亦即法身全體非是法身少分所以芥子中空便同十方太空便同十界眾色此豈煩惱情謂所計對色之空也哉二就佛界明具九竟三就迷悟明十界又二初明迷悟差別二明究竟平等初又二初約無明熏習有六凡二約法身熏習有四聖今初但從無始世來與無明心俱癡暗因緣熏習力故現妄境界以依妄境界熏習因緣故起妄相應心計我我所造集諸業受生死苦說彼法身名為眾生無明心者依本覺故而有不覺即根本住地無明所謂界外同體惑也由此根本無明癡心所故令法身體舉體而為業相即成諸心心數自證分及證自證分之內體也癡暗因緣熏習力故現妄境界者即無明熏真如體令彼心心數體幻成見相二分也依妄境界熏習因緣乃至計我我所者從根本無明法執而起枝末無明我我所執所謂界內見思惑也造集諸業者無明緣行造於有漏善惡不動三種業也受生死苦者三界分段生死樂是壞苦苦是苦苦不樂不苦是行苦也即是法身流轉六道故名眾生設無法身即無眾生之名可得矣二約法身熏習有四聖若如是眾生中法身熏習而有力者煩惱漸薄能厭世間求涅槃道信歸一實修六波羅蜜等一切菩提分法名為菩薩若如是菩薩中修行一切善法滿足究竟得離無明睡者轉名為佛法身熏習者即以本覺之性而為法身由眾生無不具此本覺性故得受有漏聞思修等熏習由熏習力為增上緣資本覺性令起無漏出世間智更不資熏煩惱種子故得煩惱漸薄由煩惱薄故能厭離世間虗偽果報厭離雖同發心有異若其無始法執重者則先求涅槃道若其無始法執輕者則能信歸一實若約發心差別則求涅槃者名為二乘信一實者乃名菩薩若約究竟所行則一是漸悟一是頓悟同名菩薩也究竟離無明睡即轉名佛設無眾生亦無菩薩佛可得矣初明迷悟差別竟二明究竟平等當知如是眾生菩薩佛等但依世間假名言說故而有差別而法身之體畢竟平等無有異相法身喻如濕性眾生如冰佛如純水二乘菩薩如冰漸泮而未盡也冰之濕性無減水之濕性無增故云畢竟平等可謂但轉其名無實性矣二廣釋竟三總結善男子是名略說一實境界義合前心體心相及如來藏三義乃可略顯一實境界以為進趣最初方便也初示一實境界以開圓解竟二示二種觀道以顯圓行二初正明二觀即圓正行二曲為障緣即圓方便助行初中三初總標二別釋三料簡今初若欲依一實境界修信解者應當學習二種觀道何等為二一者唯心識觀二者真如實觀二別釋二初釋唯心識觀二釋真如實觀初中三初正示觀門二觀成勝進三結觀功能初又三初觀境唯心二善知心相三觀門成就初又三初示所觀境二示能觀觀三勸修簡過今初學唯心識觀者所謂於一切時一切處隨身口意有所作業一切時謂行住坐臥等時一切處謂見色聞聲等處隨身口意有所作業謂做作語言攀緣等業以要言之不出六行六境一一無非所觀境也六行者一行二住三坐四臥五語言六做作六境者一見色二聞聲三嗅香四受味五覺觸六知法于此十二事中並須修學唯心識觀二示能觀觀悉當觀察知唯是心乃至一切境界若心住念皆當察知勿令使心無記攀緣不自覺知於念念間悉應觀察隨心有所緣念還當使心隨逐彼念令心自知知己內心自生想念非一切境界有念有分別也所謂內心自生長短好惡是非得失衰利有無等見無量諸想而一切境界未曾有想起於分別當知一切境界自無分別想故即自非長非短非好非惡乃至非有非無離一切相如是觀察一切法唯心想生若使離心則無一法一相而能自見有差別也此唯心識觀乃是破法執之利刀燒煩惱之猛𦦨證涅槃之要津成菩提之秘訣至簡至易至妙至玄子科有五初云悉當觀察知唯是心者總示唯心止觀門也次云乃至一切訖不自覺知示分別性觀門也心若住念於一切境則成徧計所執名分別性今即察知勿令無記攀緣不覺故名為觀此言無記與三性中無記不同三性中無記性者于善不善不可記別故名無記今以唯心識觀守記內心名之為記若復忘失唯心識觀妄想攀緣計有外境名為無記也三云於念念間訖令心自知示分別性止門也悉應觀察謂當觀察知唯是心正大乘止觀所明強觀諸法唯是心相虗狀無實也還當使心隨逐彼念令心自知者正大乘止觀所謂次第以後念破前念令知無實念也然亦不可妄計前念為所觀後念為能觀以後念起時前念已滅不得成所觀境但借前念之非實以知後念之本虗仍是當念為能觀後念為所觀由此能觀令于所觀不起實執耳四云知己內心訖起於分別示依他性中觀門也內心自生想念謂長謂短謂好謂惡謂是謂非謂得謂失謂衰謂利謂有謂無于依他起而成徧計而諸境界本無有念亦無分別不過皆是自心之相分耳五云當知一切已下示依他性中止門也一切諸法既唯自心相分則有即非有無生無滅并不執此虗相矣言一切境界即自非長非短等者且如有境於此短者視之則以為長境非長也長者視之則以為短境非短也喜者視之則以為好境非好也厭者視之則以為惡境非惡也同想視之則以為是境無是也異想視之則以為非境無非也虗妄攝受則以為得境非得也虗妄分離則以為失境非失也違其妄情則以為衰境非衰也順其妄情則以為利境非利也計彼是實則以為有境非有也計彼是虗則以為無境非無也譬如同在一處天見瑠璃魚見窟宅人見清水鬼見膿血炭火離彼四類有情心想何嘗別有法相可得又如同一美女有欲男子視之以為妙好等輩妬婦視之以為怨家魚見之深入鳥見之高飛麋鹿見之決驟不淨觀人視之以為行廁出世聖人視之知其本空入假菩薩視之知其能為十界染淨緣起佛眼視之知即法界實相舉此一法總不出于十界各自心量心外無境一切諸法例皆可知攝法歸心則心外無法因緣即空也心生想念則法隨心現無量差別因緣即假也法唯心生以心為體非有非無離一切相本無差別不生不滅因緣即中也若能念念如此觀察則何執不破何惑不消執破惑消朗然大覺方知諸法本來寂滅不復更滅矣三勸修簡過又二初勸修二簡過今初常應如是守記內心知唯妄念無實境界勿令休廢是名修學唯心識觀守者不令馳散即是定也記者恒令分明即是慧也內心者不念前境了知心外無法故名為內非枯守一腔之謂不可不知二簡過若心無記不知自心念者即謂有前境界不名唯心識觀設有外境當情即是慧心失照不可不覺察也初觀境唯心竟二善知心相又守記內心者則知貪想瞋想及愚癡邪見想知善知不善知無記知心勞慮種種諸苦眾生無始以來由于自心所現境界不了知故但能向外妄生分別不能反觀內自心相今由善修唯心識觀知境唯心心不外馳故想起即知不隨想而漂墮也貪瞋邪見根本三毒一起便知知便不令相續阿含經中所以貴知惡也與信慚等善法相應名之為善與無慚等惡法相應名為不善俱不相應名為無記知此三性差別則必能斷不善無記令其恒善知心勞慮種種諸苦則必能息虗妄塵勞令證寂滅一心法界矣三觀門成就若於坐時隨心所緣念念觀知唯心生滅譬如水流燈𦦨無暫時住從是當得色寂三昧前論修觀通一切時及一切處今約入定則四威儀中坐為最勝也知惟心生則色本無生知唯心滅則色本無滅故得色寂三昧又心生滅相譬如水流燈𦦨無暫時住則剎那才生無間即滅無容從此轉至餘方既無動轉心相本寂心既本寂色豈不然觀色唯心而悟本寂故名色寂三昧非謂色寂而心不寂也得此三昧是圓五品觀行即佛初正示觀門竟二觀成勝進又三初總示應修二別示二觀三結示利益今初得此三昧已次應學習信奢摩他觀心及信毗婆舍那觀心從事入理名奢摩他即一心三止也從體起用名毗婆舍那即一心三觀也二皆名觀心者皆有智慧照了故也皆言信者指圓十信位中不二妙止觀也前于名字位中修行唯心識觀而登五品色寂三昧非無一心不二止觀但以定慧未深未得名信今既得此色寂三昧觀行位極故應學習信二觀心念念冥理念念起用令其平等正直速登佛慧也二別示二觀又二初奢摩他二毗婆舍那今初習信奢摩他觀心者思惟內心不可見相圓滿不動無來無去本性不生不滅離分別故修行唯心識觀已能了達實無外境唯有內心今即思惟此內心相覔之了不可得故不可見是即空也橫徧十方故圓滿不動豎窮三際故無來無去是即假也體即法身法界常住故本性不生不滅離於分別是即中也一念內心本是因緣生法觀其即空假中無一事而非理故名奢摩他觀此觀徧能止息三惑徧能停止三境徧不分別止與不止是故亦名三心妙止二毗婆舍那習信毗婆舍那觀心者想見內外色隨心生隨心滅乃至習想見佛色身亦復如是隨心生隨心滅如幻如化如水中月如鏡中像非心不離心非來非不來非去非不去非生非不生非作非不作先知境界唯心又知此心即空假中則無事而非理矣事既即理理能成事故設欲想見內色生則內色便隨心生設欲想見內色滅則內色便隨心滅設欲想見外色生滅亦復如是具如八背捨八勝處十一切處所明也所執受色名為內色不執受色名為外色背捨勝處及一切處小乘修之止名不壞法觀今以圓解修之便成圓行也乃至習想見佛色身者觀想三十二相八十種好等事中間超略餘九法界及與佛界依報眷屬等想故云乃至也如此若自若他十界色像無不隨心而生隨心而滅從體起用轉變自在一一皆如幻化水月鏡像非有似有有而非有也巧術力故種種變現名之為幻心是能幻十法界色皆所幻也神通力故無而示有名之為化心是能化十法界色皆所化也此心如水十界月影恒於中現而非外來此心如鏡十界形像對至即現而無出入心本無色故十界色一一非心由心有色故十界色皆不離心心外無色故十界色皆悉非來心生色生故十界色皆非不來色秖是心故十界色皆悉非去心滅色滅故十界色皆非不去有而不有故十界色皆即非生不有而有故十界色皆非不生緣起無性故十界色皆即非作無性緣起故十界色皆非不作即中之空假名為非不來非不去非不生非不作是心作十界色也即空假之中名為非來非去非生非作是心是十界色也隨于背捨勝處及一切處乃至佛身觀中一一了達一心三觀故名毗婆舍那此觀徧能觀穿三惑徧能觀達三諦徧不分別觀與不觀是故亦名一心妙觀二別示二觀竟三結示利益善男子若能習信此二觀心者速得趣會一乘之道二觀成勝進竟三結觀功能當知如是唯心識觀名為最上智慧之門所謂能令其心猛利長信解力疾入空義得發無上大菩提心故了知心外無法而修一心圓頓止觀從五品位增長信解而登六根淨位則得疾入第一義空不墮凡夫及二乘地任運三心圓發入圓初住名為無上大菩提心也初釋唯心識觀竟二釋真如實觀三初正示觀門二觀成勝進三結觀功能初中三初明觀法二明所超三明觀成今初若學習真如實觀者思惟心性無生無滅不住見聞覺知永離一切分別之想前依他性止門已知一切法唯心想生唯心生滅無暫時住今即因此而入真實性中觀門故云思惟心性無生無滅也何者不了法界似有心生生時覓之了不可得則性即無生既無有生云何有滅滅則無心而心性非無故無滅也次入真實性中止門故云不住見聞覺知何者心性雖無生滅本非色聲香味觸法如何可得見聞覺知設有可見可聞可覺可知便非心性以心不自知心心不自見心故又復不得別認不可見聞覺知境界以為心性故云永離一切分別之想何者心性雖復不可見聞覺知而見聞覺知體即是心不可別喚不見不聞不覺不知境界以為心也二明所超漸漸能過空處識處無少處非想非非想處等定境界相得相似空三昧觀行位中習此真如實觀直觀心性永離分別則雖不學次第禪門自漸能超四空定境以彼四空定境皆不能離分別想故且如入空處定者必先厭患色籠修觀破色緣無邊空而入於定定心與彼空處相應住此覺知是分別想非無分別也次入識處定者必先厭患虗空捨空緣識而入於定定心與彼識處相應住此覺知亦是分別非無分別也次入無少處定者亦名無所有處必先厭患於識捨識緣無所有而入於定定心與彼無所有處相應住此覺知亦是分別非無分別也次入非想非非想處定者必先厭患無所有處捨無所有想緣非想非非想而入於定定心與彼非想非非想處相應住此微細覺知猶復是分別想非無分別所以報盡還墮不證真常也今修真如實觀永離一切分別之想所以觀行位中即已善超三有而得相似空三昧門三明觀成得相似空三昧時識想受行粗分別相不現在前從此修學為善知識大慈悲者守護長養是故離諸障礙勤修不廢展轉能入心寂三昧既登觀行一品即能圓伏五住煩惱故心心數粗分別相不現在前十方諸佛菩薩真善知識同皆守護令得長養乃至能入心寂三昧由觀心性無生無滅而入三昧故名心寂心寂則色亦寂矣初正示觀門竟二觀成勝進又二初證入二離過今初得是三昧已即復能入一行三昧入是一行三昧已見佛無數發深廣行心住堅信位所謂於奢摩他毗婆舍那二種觀道決定信解能決定向心寂色寂是五品之終一行三昧是十信之始觀行位極相似解發故云即復能入也言一行者圓信圓解一行即一切行一切行即一行所謂繫緣法界一念法界法界無外更無餘行以即空故名圓聖行以即假故名圓梵行及嬰病行以即中故名圓天行又事即理故一心圓具聖梵天行體即用故一心圓興嬰兒病行又入一行三昧即前所明信奢摩他觀心見佛無數發深廣行心即前所明信毗婆舍那觀心由此一心圓頓止觀住六根淨堅信位中此但名為決定信解決定能向一乘大菩提心登圓住也圓住以上乃名真實奢摩他毗婆舍那道故二離過隨所修學世間諸禪三昧之業無所樂著乃至遍修一切善根菩提分法於生死中無所怯畏不樂二乘圓教堅信位人仍有二種一者直修頓觀中中流入二者或修漸及不定兩觀雙照二邊雖照二邊恒契中道故學世間禪三昧時不同凡夫之著有修出世間菩提分時不同二乘之樂空也二觀成勝進竟三結觀功能以依能習向二觀心最妙巧便眾智所依行根本故明此真如實觀乃是能向奢摩他毗婆舍那二觀心之最妙巧便依此得成一心三智故是眾智所依從此發生五行萬行故是行之根本也二別釋二觀竟三料簡復次修學如上信解者人有二種何等為二一者利根二者鈍根其利根者先已能知一切外諸境界唯心所作虗誑不實如夢如幻等決定無有疑慮陰蓋輕微散亂心少如是等人即應學習真如實觀其鈍根者先未能知一切外諸境界悉唯是心虗誑不實故染著情厚蓋障數起心難調伏應當先學唯心識觀雖依一實境界以修信解並屬圓教名字位人而此圓人仍有利鈍若久熏圓解知境唯心五濁習輕者則陰蓋輕微散亂亦少所以即可體達識心本寂了知三千宛然即空假中名為學習真如實觀也若初獲圓聞染情尚厚五濁習重者則蓋障數起心難調伏所以必須照於起心變造十界知其無不即空假中名為先學唯心識觀也然鈍根之人不可即修真如實觀而利根之人不妨亦修唯心識觀但以理攝事則名真如實觀從事入理則名唯心識觀耳設欲捨事觀理則既非唯心識觀又非真如實觀所以大乘止觀深誡初心之人不可越前二性徑依第三性修但可念念之中三番並學資成第三番也准此則名字位中止可先習唯心識觀以其未能不起九界心故觀行初品便可隨意修此二觀若起九界心時則觀唯識若不起九界心時則觀真如觀唯識則色寂而心亦寂觀真如則心寂而色亦寂也初正明二觀竟二曲為障緣三初現離障緣二求生淨土三結歎方便初中三初明障緣二示方便三明得離今初若人雖學如是信解而善根業薄未能進趣諸惡煩惱不得漸伏其心疑怯畏墮三惡道生八難處畏不常值佛菩薩等不得供養聽受正法畏菩提行難可成就有如此疑怖及種種障礙等者雖學如是信解謂依一實境界而學信解亦即名字初心人也淨熏習淺故善根業薄染熏習厚故煩惱不伏此須四句料簡自有善根厚而煩惱薄者如前即應學習真如實觀者是也自有善根厚而煩惱厚者如前應當先學唯心識觀者是也若善根雖薄煩惱亦薄者事可兩向以煩惱薄故可習真如實觀以善根薄故或先學唯心識觀也今為善根薄而煩惱厚者多疑多障并不能即修唯心識觀須為別示善巧方便也二示方便又三初稱名字二觀法身三修厭離稱名字者即附淨分分別依他二性止觀以助唯心識觀對治不常值佛菩薩聽法之畏觀法身者即附淨分真實性之止觀以助真如實觀對治菩提行難可成就之畏修厭離者正破染分分別依他二性成就唯心識觀漸伏煩惱對治三惡八難之畏也今初應於一切時一切處常勤誦念我之名字諸佛菩薩真實功德通別名號並由證真實性稱性所成緣起作用能與眾生作增上緣眾生不了計有心外佛菩薩名即為淨分分別性攝若知名號是我自心所現相分即為淨分依他性攝能于一切時處常勤誦念勿令間斷則心不散亂名為妙止名號歷然名為妙觀便可助顯唯心識觀兼有滅障勝功能矣二觀法身若得一心善根增長其意猛利當觀我法身及一切諸佛法身與己自身體性平等無二無別不生不滅常樂我淨功德圓滿是可歸依若得一心善根增長者由前一切時處勤念稱名伏除昏散也昏散既除意即猛利堪依一實境界以修信解觀察地藏大士及一切諸佛同皆證此現前一念自性清淨心如來之藏以為法身我身亦復全攬自性清淨心如來之藏以為其體迷悟雖殊性恒平等生佛唯此一心故無二不因迷悟而有隔異故無別無始成就故不生永永常住故不滅無對待故常無所受故樂無戲論故我無所離故淨性具不可思議無漏清淨之業究竟顯發故功德圓滿是則歸依大士及佛全即歸依自心故云自歸依佛自歸依法自歸依僧也除自法外更于何處別有三寶可歸依耶一切歸依三寶無論達與不達尅實論之皆是自歸依耳三修厭離又復觀察己身心相無常苦無我不淨如幻如化是可厭離現前一念心性本與大士諸佛體同而由無始迷惑妄認四大為己身相妄認六塵緣影為己心相譬如棄海認漚安得不於常住之中妄見無常樂中受苦自在性中不得自在清淨性中妄成雜染而此無常苦無我不淨之妄身妄心仍依現前一念心性而起但如幻化非別有實何乃被此虗誑不實身心所惑而起諸惡煩惱耶修此厭離對治分別染著則能成就二種觀道也二示方便竟三明得離若能修學如是觀者速得增長淨信之心所有諸障漸漸損減何以故此人名為學習聞我名者亦能學習聞十方諸佛名者名為學至心禮拜供養我者亦能學至心禮拜供養十方諸佛者名為學聞大乘深經者名為學執持書寫供養恭敬大乘深經者名為學受持讀誦大乘深經者名為學遠離邪見於深正義中不墮謗者名為於究竟甚深第一實義中學信解者名為能除諸罪障者名為當得無量功德聚者此人捨身終不墮惡道八難之處還聞正法習信修行亦能隨願往生他方淨佛國土學如是觀雙指法身及厭離觀也現前一念之心即是依他起性今觀法身則能顯出依他性中圓成實性復修厭離則能除滅依他性中徧計執性由顯圓成則淨信增長由除徧計則諸障損減也何以故下歎其善學蓋我及十方諸佛不過轉滅依他中之徧計令其淨盡轉顯依他中之圓成令其滿足秖此所顯圓成實性名為一體三寶亦名究竟甚深第一實義何者如如之理名為法寶如如之智名為佛寶理智不二名為僧寶滿證一體三寶者名為十方諸佛分證一體三寶者名為諸大菩薩詮顯一體三寶者名為大乘深經聞此一體三寶而不疑惑名為聞慧觀察一體三寶而無滯礙名為思慧念念覺此一體三寶而無間斷名為修慧今此行人既能一心稱名觀察法身厭離妄執則聞地藏洪名即為徧聞十方佛名禮拜供養地藏即為徧禮徧供十方諸佛可謂佛不說法恒聞梵音口無言聲徧誦眾典手不執卷常演是經心不思惟普照法界矣有何罪障而不除有何功德而不滿有何惡趣門而不閉有何淨佛土而不生耶初現離障緣竟二求生淨土復次若人欲生他方現在淨國者應當隨彼世界佛之名字專意誦念一心不亂如上觀察者決定得生彼佛淨國善根增長速獲不退上文既明求離障緣者修三方便不惟現離諸障兼能隨願往生今更特明求生淨土者若能修三方便不惟決生淨土亦能現獲不退也專意誦念彼佛名字令離昏散即名一心不亂即是稱名方便也如上觀察即觀法身及修厭離二方便也具三方便則捨身定生彼國現在善根增長速獲不退故知持名有大功德不可視作淺近法門三結歎方便二初歎一心業勝二簡雜亂益微初又二初正歎二結釋今初當知如上一心繫念思惟諸佛平等法身一切善根中其業最勝所謂勤修習者漸漸能向一行三昧若到一行三昧者則成廣大微妙行心名得相似無生法忍依於一實境界以開圓解知十方佛我及眾生同一淨心為體是名一心常勤稱念佛之名字是為繫念觀于諸佛法身與己平等是為思惟諸佛平等法身此于一切善根則為最勝故阿彌陀經云不可以少善根福德因緣得生彼國執持名號一日乃至七日一心不亂即得往生由此執持名號即是多善根福德因緣故也上明修二觀者須得色寂心寂三昧方能入於一行三昧今即以繫念名字而當唯心識觀思惟法身而當真如實觀故即能向一行三昧也了達一心而持名號其功若此奈何弗信以能得聞我名字故亦能得聞十方佛名字故以能至心禮拜供養我故亦能至心禮拜供養十方諸佛故以能得聞大乘深經故能執持書寫供養恭敬大乘深經故能受持讀誦大乘深經故能於究竟甚深第一實義中不生怖畏遠離誹謗得正見心能信解故決定除滅諸罪障故現證無量功德聚故謂由圓聞圓思圓修所以能到一行三昧也聞我名聞十方佛名聞大乘深經即名字位中聞慧也至心禮拜供養我及諸佛執持讀誦大乘深經不生怖畏得正見心即觀行位中思慧也決定除滅罪障現證無量功德即相似位中修慧也二結所以者何謂無分別菩提心寂靜智現起發方便業種種願行故能聞我名者謂得決定信利益行故乃至一切所能者皆得不退一乘因故無分別菩提心即信解一實境界之心也寂靜智現即習信奢摩他觀也起發方便業種種願行即習信毗婆舍那觀也由得決定信利益行方為能聞我名由得不退一乘因方為能至心禮拜等一切所能初歎一心業勝竟二簡雜亂益微又二初聞猶不聞二修猶不修今初若雜亂垢心雖復稱誦我之名字而不名為聞以不能生決定信解但獲世間善報不得廣大深妙利益不達心外無法名之為雜自心還取自心名之為亂妄起種種染著名之為垢所以雖復稱誦不得為聞以未聞地藏二字之實義故地即心地藏即性藏心性無二安得有雜既本無雜何由有亂既已無亂何得有垢今彼不達無二心性所以本無雜亂垢中妄成雜亂垢障不聞地藏之圓名也若於名字位中圓聞一實境界而生于慧則心無雜隨於觀行位中圓思唯識真如而生於慧則心無亂次於相似位中圓修一行三昧而生於慧則心無垢乃成決定信解也然雖雜亂垢心稱誦名字亦獲世間種種善報所謂現離衰惱後生人天漸漸熏習終成佛道但現前不能即得廣大深妙利益耳二修猶不修如是雜亂垢心隨其所修一切諸善皆不能得深大利益意顯若開圓解則隨所修善皆得大益所謂圓人受法無法不圓也二示二種觀道以顯圓行竟三示三忍四佛以彰圓位三初總標二別釋三簡修今初善男子當知如上勤心修學無相禪者不久能獲深大利益漸次作佛無相禪即指依於一實境界所修唯識真如二種觀也此二種觀無生死相無涅槃相故名無相而悉具足止觀定慧故名為禪梵語禪那此翻靜慮靜即止定慮即觀慧亦即寂照之異名也深大利益意指功德莊嚴漸次作佛意指智慧莊嚴又利益約忍約無間道作佛約智約解脫道也二別釋二初釋利益二釋作佛初又二初明入位二釋忍義今初深大利益者所謂得入堅信法位成就信忍故入堅修位成就順忍故入正真位成就無生忍故十發趣心名堅信忍十長養心名堅法忍十金剛心名堅修忍今但合稱為堅修位體性十地名無生忍分證法身名入菩薩正位也然諸經明忍開合多少不同大小橫豎亦異今須略辯以示方隅復須以義定名令其不濫共為三意一列名二解釋三結屬一列名者或明二忍謂一生忍二法忍或明三忍如此文或明四忍謂一伏忍二順忍三無生忍四寂滅忍或明五忍謂加第二信忍或明六忍謂加第三和從忍順為第四也二解釋者小乘以耐怨害為生忍耐勤苦為法忍非今所用別教以地前名生忍則淺地上名法忍則深亦非所用圓教明十界假名皆空故為生忍十界實法皆空故為法忍圓觀二空無次第無淺深也三忍者別教則十信為信忍三十心為順忍登地為無生忍圓教則初後皆信實相悉名信忍初後皆與實相不相違背悉名順忍初後皆不起二邊心悉名為無生忍也四忍者別教則以十信為伏忍順忍無生忍如前說妙覺名寂滅忍圓教則從初心至金剛頂皆悉圓伏五住皆名伏忍初後皆悉休息眾行通得名寂滅忍順及無生例如前說也五忍者別教以十信初心為伏後心為信順等如前圓亦如前說也六忍者別教則分十住以為和從十行十向為順圓教則始終不乖實相悉得名和從也三結屬者今經言局意圓不論二忍三忍四忍五忍六忍但取觀行位中所有諸忍束之以為信忍相似位中所有諸忍束之以為順忍分證乃至極位所有諸忍束為無生忍也二釋忍義又成就信忍者能作如來種性故成就順忍者能解如來行故成就無生忍者得如來業故如來無漏智慧所依妙定名之為忍依于此忍發一切智作如來種故名信忍依於此忍發道種智解如來行故名順忍依於此忍而發一切種智得如來業名無生忍非橫非豎可橫可豎豎約三位橫約一心也初釋利益竟二釋作佛漸次作佛者略說有四種何等為四一者信滿法故作佛所謂依種性地決定信諸法不生不滅清淨平等無可願求故二者解滿法故作佛所謂依解行地深解法性知如來業無造無作於生死涅槃不起二想心無所怖故三者證滿法故作佛所謂依淨心地以得無分別寂靜法智及不思議自然之業無求想故四者一切功德行滿足故作佛所謂依究竟菩薩地能除一切諸障無明夢盡故滿法謂一實境界圓滿無分別法也信滿法故觀行即佛解滿法故相似即佛證滿法故分證即佛功德行滿足故究竟即佛性恒平等故皆名佛修分明昧故說有四圓家之漸漸無不圓天台六即蓋本諸此除慢除怯盡美盡善之法門也二別釋竟三簡修二初簡三種人二示十種相今初復次當知若修學世間有相禪者有三種何等為三一者無方便信解力故貪受諸禪三昧功德而生憍慢為禪所縛退求世間二者無方便信解力故依禪發起偏厭離行怖怯生死退墮二乘三者有方便信解力所謂依止一實境界習近奢摩他毗婆舍那二種觀道故能信解一切法唯心想生如夢如幻等雖獲世間諸禪功德而不堅著不復退求三有之果又信知生死即涅槃故亦不怖怯退求二乘上明修出世間無相禪者速能成就三忍四佛今簡修學世間有相禪者則有三種差別欲人先學大乘進趣方便依于一實境界而修信解庶不悞墮世間及二乘也言有相者即是十二門禪所謂四禪四等四無色定皆有境相可攀緣也貪受諸禪而生憍慢名增上慢甫伏欲界思惑仍起上界思惑暫離欲縛仍被禪縛故遂違遠菩提退求世間色無色界果報樂也依禪發起偏厭離行者謂由證得初禪等故定心觀察三界過患見生死苦斷煩惱集欣涅槃滅修永離道不復發起大悲方便也若依一實境界以為最初方便習學奢摩他毗婆舍那不二止觀則知一切諸法唯心想生皆如夢幻當體不實何容於此夢幻之法而生堅著生怖怯耶是知無方便信解者貪著諸禪則成生死有相依禪起厭則成涅槃空相若有方便信解者遊戲諸禪禪不能縛即生死之有便是實相之有深觀涅槃亦不取證即涅槃之空便是第一義空實相之有有無有相第一義空空無空相一一皆成無相禪矣二示十種相如是修學一切諸禪三昧法者當知有十種次第相門具足攝取禪定之業能令學者成就相應不錯不謬何等為十此明不論修學無相有相諸禪並須知此十種相門方能成就不錯謬也若不得此十門意者世間初禪尚難成就況出世間上上禪耶若得此十門意則一切禪定之業無不具足攝取成就一者攝念方便相此如天台止觀所明二十五前方便也不論修學世出世禪並須具之一具五緣二訶五欲三棄五蓋四調五事五行五法幸自細簡摩訶止觀禪波羅蜜等書二者欲住境界相此是內方便之初門謂或繫緣止或制心止或體真止必各各有所觀境也三者初住境界分明了了知出知入相此是內方便中初學安心法也隨所觀境不令昏散坐起則知出相坐時則知入相四者善住境界得堅固相此是內方便中已得安心法也且如修安般者則心善住於出入息乃至修體真者則心善住諸法空等五者所作思惟方便勇猛轉求進趣相且如修安般者已得欲界粗住轉求細住乃至修體真者歷觀諸法無不空也六者漸得調順稱心喜樂除疑惑信解自安慰相且如修安般者證欲界定覺心明淨與定相應定法持心無分散意乃至修體真者了了信解諸法本空也七者尅獲勝進意所專者少分相應覺知利益相且如修安般者從未到定泯然虗豁失於欲界之身始證初禪八觸或動或痒或涼或暖或輕或重或澁或滑隨發一觸則有十種善法功德相應俱起一定二空三明淨四喜悅五樂六善心生七知見明了八無累解脫九境界現前十心調柔軟故云少分相應覺知利益相也乃至修體真者發得初禪與法空理少得相應覺知利益也八者轉修增明所習堅固得勝功德對治成就相且如修安般者已發初禪五支成就所謂一覺二觀三喜四樂五一心支不退不轉對治欲散具足成就初禪功德乃至修體真者空理增明斷諸有結也九者隨心有所念作外現功業如意相應不錯不謬相且如證初禪者能起二種變化謂初禪化欲界化證二禪者能起三化證三禪者能起四化證四禪者能起五化共名十四變化乃至證體真者能起六神通也十者若更異修依前所得而起方便次第成就出入隨心超越自在相且如證初禪者若更異修四禪四等四無色定并及觀練熏修一切諸禪無不依于所得初禪而起方便乃可次第成就既成就已乃能出入隨心既隨心已乃能超越自在又如已證體真止者或更異修方便隨緣止乃至息二邊分別止亦無不依于所得體真止而起方便乃能次第成就出入隨心超越自在也是名十種次第相門攝修禪定之業縱令修學唯心識觀真如實觀出世無相禪者亦必有此十種次第相門方獲成就方與奢摩他毗婆舍那恒得相應思之思之二示進趣義竟三示善巧說二初問二答今初爾時堅淨信菩薩摩訶薩問地藏菩薩摩訶薩言汝云何巧說深法能令眾生得離怯弱上雖開示一實境界徹底分明猶恐愚鈍眾生於空假中宛轉相即之義未能信解則不能修二種觀道故特問之又由佛先歎其善安慰說故也二答為二初示種種巧說二明離相違過初中二初總示二別明今初地藏菩薩摩訶薩言善男子當知初學發意求向大乘未得信心者於無上道甚深之法喜生疑怯我嘗以巧便宣顯實義而安慰之令離怯弱是故號我為善安慰說者二別明三初慰小心怯弱二慰不解意旨三慰妄計自然小心怯弱由聞大乘即假義生故以大乘即空慰之不解意旨由聞大乘即空義生故以大乘即中慰之妄計自然由執即中性德義生故以大乘修得慰之也初中三初明怯弱二明善說三明得益今初云何安慰所謂鈍根小心眾生聞無上道最勝最妙意雖貪樂發心願向而復思念求無上道者要須積功廣極難行苦行自度度他劫數長遠於生死中久受勤苦方乃得獲以是之故心生怯弱本為執性廢修者說此稱性修行之法是圓有門而鈍根聞之則作三大阿僧祇劫苦行之解又以小心而生怯弱也二明善說我即為說真實之義所謂一切諸法本性自空畢竟無我無作無受無自無他無行無到無有方所亦無過去現在未來乃至為說十八空等無有生死涅槃一切諸法定實之相而可得者又復為說一切諸法如幻如化如水中月如鏡中像如乾闥婆城如空谷響如陽光如泡如露如燈如目𪾼如夢如電如雲煩惱生死性甚微弱易可令滅又煩惱生死畢竟無體求不可得本來不生實更無滅自性寂靜即是涅槃此是善說第一義空以破有執皆約圓教空門仍復依三諦說初云所謂一切諸法乃至而可得者即圓真諦次云又復為說乃至易可令滅即圓俗諦後云又煩惱生死乃至即是涅槃是圓中諦也初言一切諸法者即十界百界千如假實國土等法也本性自空者緣生無性也畢竟無我者十界內外諸法推求主宰實不可得也無作無受者無我故無作因受果之人也無自無他者既無我人則不可分別自他也無行無到無有方所者既無實迷亦無實悟無有此岸彼岸處所可分別也亦無過去現在未來者過去已滅現在不住未來未有三世皆悉性空寂滅也十八空者空尚非一那有十八約十八境而顯空理名十八空所謂一內空二外空三內外空四空空五大空六第一義空七有為空八無為空九畢竟空十無始空十一散空十二性空十三自相空十四諸法空十五不可得空十六無法空十七有法空十八無法有法空也生滅涅槃一切諸法皆無定實之相所謂性真常中求於去來迷悟生死了無所得此則一空一切空假中皆空依于圓融真諦說也如幻如化等者非有似有有非實有五住煩惱二種生死性皆微弱易滅此則一假一切假空中皆假依於圓融俗諦說也是中舉十四喻總是六喻九喻十喻出沒開合有殊而義並無增減又雖並含空假中意而皆對治實有法執仍屬空門言陽光者即是陽𦦨亦名野馬燈𦦨喻其易滅目𪾼妄見空華電不久停雲易出沒餘並可知又五住煩惱二種生死即以一實境界法性為體故畢竟別無自體可得即是不生不滅寂靜涅槃此則一中一切中空假皆中依于圓融中諦說也而亦對治實有法執還屬空門三明得益如此所說能破一切諸見損自身心執著想故得離怯弱一切皆空何所不破涅槃尚空況復身心情見一切皆假復何所不破涅槃亦假況復身心情見一切非空非假又何所不破生死煩惱皆悉非空非假更何得有身心情見所以能破諸見能損執著令離佛道長遠之怯弱也初慰小心怯弱竟二慰不解意旨三初明不解二明善說三明得益初又三初直標不解二示佛旨意三正明謬解今初復有眾生不解如來言說旨意故而生怯弱二示佛旨意當知如來言說旨意者所謂如來已能見彼一實境界故究竟得離生老病死眾惡之法證彼法身常恒清涼不變等無量功德聚復能了了見一切眾生身中皆有如是真實微妙清淨功德而為無明闇染之所覆障長夜恒受生老病死無量眾苦如來於此起大慈悲意欲令一切眾生離於眾苦同獲法身第一義樂而彼法身是無分別離念之法唯有能滅虗妄識想不起念者乃所應得但一切眾生常樂分別取著諸法以顛倒妄想故而受生死是故如來為欲令彼離於分別執著想故說一切世間法畢竟體空無所有乃至一切出世間法亦畢竟體空無所有若廣說者如十八空如是顯示一切諸法皆不離菩提體菩提體者非有非無非非有非非無非有無俱非一非異非非一非非異非一異俱乃至畢竟無有一相而可得者以離一切相故離一切相者所謂不可依言說取以菩提法中無有受言說者及無能言說者故又不可依心念知以菩提法中無有能取可取無自無他離分別相故若有分別想者則為虗偽不名相應見彼一實境界證於中道實相體也究竟得離生老病死即證如實空義也證彼無量功德即證如實不空義也自證三德秘藏了知眾生同具如是三德秘藏故起大慈大悲欲拔其苦欲與其樂為說畢竟第一義空令彼得離分別執著然所謂一切世間法一切出世間法畢竟體空無所有者正以十界假實國土染淨諸法皆不離菩提體所以別無自體正顯因緣所生無不即中而菩提體即是一實境界第一義自性清淨心如來之藏此體本自非有非無乃至離分別相故也言菩提體非有者不同情計生死有故言菩提體非無者不同情計斷滅無故非非有非非無者不墮雙非戲論句故非有無俱者不墮雙亦相違句故非一者不變隨緣作種種故非異者隨緣不變無二性故非非一非非異者離戲論句故非一異俱者離相違句故乃至畢竟無有一相而可得者不墮有無一異種種四句相故言菩提體離一切相者以不可依言說取亦不可依心念知故即是言語道斷心行處滅方顯菩提法體此等開示本依圓教非有非空門說三諦皆悉非有非空大部般若多明此義昧者不知故判作空宗耳三正明謬解如是等說鈍根眾生不能解者謂無上道如來法身但唯空法一向畢竟而無所有其心怯弱畏墮無所得中或生斷滅想作增減見轉起誹謗自輕輕他遮遣情執本為顯示法性無分別體而鈍根隨語謬解一向謂空或生恐畏或計斷滅畏則作增見而轉起誹謗謂非佛說計則作減見而自輕輕他謂歸斷滅也初明不解竟二明善說我即為說如來法身自性不空有真實體具足無量清淨功業從無始世來自然圓滿非修非作乃至一切眾生身中亦皆具足不變不異無增無減此依圓教有門直顯法身中道之體諸佛眾生平等具足非斷滅也三明得益如是等說能除怯弱是名安慰二慰不解意旨竟三慰妄計自然三初明妄計二明善說三明得益今初又復愚癡堅執眾生聞如是等說亦生怯弱以取如來法身本來滿足非修非作相故起無所得相而生怯弱或計自然墮邪倒見圓滿菩提歸無所得以無所得則無所不得故得大用現前二利滿足而彼妄起無所得相則以不可湊泊而生怯弱又妄計生佛平等不假修習聞說婬怒癡性即是佛性則恣行貪恚無慚恥心聞說幻化空身即是法身則寶其臭穢不復厭離聞說地獄天宮皆為淨土則安此泥沙不求出要當今談圓頓者類皆墮此亦可哀也二明善說我即為說修行一切善法增長滿足生如來色身得無量功德清淨果報此依圓教全性起修之義仍屬有門對治無所得見并治自然邪倒見也三明得益如此等說令離怯弱是名安慰初示種種巧說竟二明離相違過三初標二釋三結今初而我所說甚深之義真實相應無有諸過以離相違說故云何知離相違相二釋為三初釋慰怯弱者所說空義二釋慰不解者所說不空義三釋慰妄計者所說修得義今初所謂如來法身中雖復無有言說境界離心想念非空非不空乃至無一切相不可依言說示而據世諦幻化因緣假名法中相待相對則可方便顯示而說以彼法身性實無分別離自相離他相無空無不空乃至遠離一切諸相故說彼法體為畢竟空無所有以離心分別之時想念則盡更無一相而能自見自知為有是故空義決定真實相應不謬此明如來藏如實空義與彼藏體相應不謬也二釋慰不解者不空義復次即彼空義中以離分別妄想心念故則盡畢竟無有一相而可空者以唯有真實故即為不空所謂離識想故無有一切虗偽之相畢竟常恒不變不異以更無一相可壞可滅離增減故又彼無分別實體之處從無始世來具無量功德自然之業成就相應不離不脫故說為不空此明如來藏如實不空義正從如實空義而顯恒與無分別之藏體相應也三釋慰妄計者所說修得義如是實體功德之聚一切眾生雖復有之但為無明𪾼覆障故而不知見不能尅獲功德利益與無莫異說名未有以不知見彼法體所有功德利益之業非彼眾生所能受用不明屬彼唯依遍修一切善法對治諸障見彼法身然後乃獲功德利益是故說修一切善法生如來色身此明如來藏所具性德必藉修顯故名修得亦不違平等體也今更借喻以合明之譬如室中本無鬼魅蛇蟲但有金銀珍寶盲人不見觸彼珍寶而受毀傷妄計蛇鬼憂怖失措今指蛇鬼本無名為如實空義珍寶本有名為實不空義須彼盲人去無明膜開智慧眼方能受用金銀珍寶名修得義二乘信如來語知無蛇鬼不生恐怖于空作證如彼盲人兀然中坐不觸珍寶故不能見不空義也又如來色身亦如乳中醍醐尼拘律子中五丈樹性不可謂有不可謂無須藉因緣然後得之二釋竟三結善男子如我所說甚深之義決定真實離相違過當如是知正說段中二演說竟三獲益爾時地藏菩薩摩訶薩說如此等殊勝方便深要法門時有十萬億眾生發阿耨多羅三藐三菩提心住堅信位復有九萬八千菩薩得無生法忍一切大眾各以天妙香華供養於佛及地藏菩薩摩訶薩初開圓解能知如來秘密之藏名為發無上心信解不動名為堅信觀行佛也證圓初住名得無生法忍分證佛也天妙香華以為供養表圓道無作緣了二正說段竟三流通段三初囑付受持二結法名義三時眾歡喜初中二初囑付二受持今初爾時佛告諸大眾言汝等各各應當受持此法門隨所住處廣令流布所以者何如此法門甚為難值能大利益若人得聞彼地藏菩薩摩訶薩名號及信其所說者當知是人速能得離一切所有諸障礙事疾至無上道汝等各各下正勸受持廣布所以者何下釋成囑勸意也疾至無上道者顯是圓頓純妙法門不同方便權說二受持於是大眾皆同發言我當受持流布世間不敢令忘二結法名義二初問二答今初爾時堅淨信菩薩摩訶薩白佛言世尊如是所說六根聚修多羅中名何法門此法真要我當受持令末世中普皆得聞本是堅淨信菩薩代為末世眾生請問所以還請結名受持流通永永也由結名故則顯真要真是經體要是經宗宗體既明方有力用也二答佛告堅淨信菩薩此法門名為占察善惡業報亦名消除諸障增長淨信亦名開示求向大乘者進趣方便顯出甚深究竟實義亦名善安慰說令離怯弱速入堅信決定法門依如是名義汝當受持結此諸名各有通別二義通則一部圓詮皆是占察善惡業報之義略如玄義所明又皆能除障增信皆是開示大乘進趣方便皆能顯深實義皆是善安慰說別則指初示占察法名為占察善惡業報指彼第二輪中修懺悔法名為消除諸障增長淨信指二示進趣義名為開示求向大乘顯出甚深究竟實義指三示善巧說名為善安慰說令離怯弱總此通別二義皆令速入堅信決定法門也又占察二字約宗立名善惡業報約體立名消除諸障增長淨信約用立名開示求向大乘者進趣方便約宗立名顯出甚深究竟實義約體立名善安慰說令離怯弱約用立名速入堅信決定法門亦約用名兼顯圓頓大乘教相也二結法名義竟三時眾歡喜佛說此法門名已一切大會悉皆歡喜信受奉行三義故喜如常可知䟦語憶辛未冬寓北天目有溫陵徐雨海居士法名弘鎧向予說此占察妙典予乃倩人特往雲棲請得書本一展讀之悲欣交集癸酉冬日寓金庭西湖寺依經立懺乙亥夏初寓武水智月菴講演分科是時即有作疏之願病冗交沓弗克如願屈指十五年來梵網佛頂唯識法華皆已註釋獨此夙願尚未填還亦可歎也今庚寅年閱世已及五十二歲百念灰盡偶有同志數人仍來結夏北天目之藏堂究心毗尼予念末世欲得淨戒捨此占察輪相之法更無別途爰命筆於六月朔日成稿于十有四日輸一滴以益大海捧一塵而培須彌雖無補于高深庶善鑽于乳酪公我同志共享醍醐前安居第四褒灑陀前一夜蕅益智旭閣筆故䟦
