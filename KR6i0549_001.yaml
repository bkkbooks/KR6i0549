body:
  text: 隋外國沙門菩提登譯古吳蕅益沙門智旭述經文為三從如是我聞至是故我今令彼説之是序段從爾時堅淨信菩薩既解佛意至下卷及供養地藏菩薩摩訶薩是正説段從爾時佛告諸大衆至信受奉行是流通段序段為二初證信序二發起序今初如是我聞一時婆伽婆一切智人在王舍城耆闍崛山中以神通力示廣博嚴淨無礙道場與無量無邊諸大衆俱演説甚深根聚法門如是者指所聞法體謂如於一實境界之是無錯謬也我者阿難分證法身般若解脫常樂我淨之德得八自在非我非無我隨世假名而稱我也聞者阿難了達根性聲性識性皆是一實境界能所圓融非聞非不聞而言聞也一時者圓感圓應始終不出現前一念也婆伽婆一切智人者究竟圓證一實境界大覺世尊由一切衆生同分善根所感各于心中所現之教主也梵語婆伽婆亦云薄伽梵具六義故不翻乃總衆德至尚之名謂如來永不繫屬諸煩惱故具自在義猛𦦨智火所燒鍊故具熾盛義妙三十二大丈夫相八十種好所莊飾故具端嚴義一切殊勝功德圓滿無不聞故具名稱義一切世間親近供養咸稱讚故具吉祥義自利滿足常起方便利益安樂一切有情無懈廢故具尊貴義圓滿一切種智薩婆若果于一實境界若權若實究盡明了無有不知無有不見故名一切智人也王舍城耆闍崛山者王舍梵稱羅閲祇伽羅中天竺境阿闍世王所都耆闍崛此翻靈鷲離王舍城東北有三四里此城此山乃同居土一切衆生共相識種所變器界即是各各自第八識之相分境更互為增上緣更互為質為影和合似一而實各得其全以為依報無雜無障礙也一切智人亦在其中者大慈悲力應可化機不離常寂光土而垂凡聖同居穢土之相秖此穢土若在衆生分中則是有漏相分若在諸佛分中則是無漏相分也以神通力示廣博嚴淨無礙道場者秖此靈山本是唯心所現以心為體心外無山心廣博故山亦廣博心嚴淨故山亦嚴淨心無礙故山亦無礙廣博是性量量同虗空離一切相故是般若德嚴淨是性具具無邊德即一切法故是解脫德無礙是性體體融遮照非空非有不礙空有故是法身德法身即常解脫即寂般若即光蓋本是常寂光土性德妙境衆生迷之而為同居穢土于佛恆是廣博嚴淨無礙道場修德滿足恆自受用稱性法樂亦名上品實報淨土無示不示今為一類衆生堪能返迷歸悟佛以神通之力加被令見則是不離同居橫覩他受用土故名示也神者天然不測之體即法身德通者照了無滯之慧即般若德力者轉變自在之能即解脫德由諸佛心內衆生修德有功故能感于衆生心內之佛為示妙境由衆生心內之佛性德圓證故能應於諸佛心內衆生令見道場秖此道場若在諸佛分中則是無漏相分若在衆生分中則是有漏相分也是故同居穢土衆生本質恆是有漏佛托衆生有漏本質所變相分恆是無漏同能變識是無漏故無礙道場諸佛本質恆是無漏衆生托佛無漏本質所變相分恆是有漏同能變識是有漏故離却佛及衆生之心則有漏無漏若質若影皆不可得故云一切唯心惟是一實境界也與無量無邊諸大衆俱者同聞衆也此諸大衆若已證同生性者則與諸佛分同無漏若猶在異生性者則與衆生同屬有漏應取圓住別地已上名同生性若圓十信別三賢通八人以上藏四果辟支望偏真理得名同生望此一實仍名為異生也演説甚深根聚法門者指所已説梵文未來據後文云六根聚修多羅應如央掘經所明具足無減修亦如普賢觀經所明淨六根法也蓋迷一實境界幻成六根隨一一根一切諸法無不趣之眼為法界具足出生十界百界千如三千性相無欠無餘耳鼻舌身意亦復如是故名根聚秖此根聚全攬一實境界而成即復圓具一實境界全體大用故名甚深秖此甚深根聚能生物解任持自性故名為法即法能通復名為門由演此法誠恐末世鈍根不能信解橫于一實境界而起疑悔所以堅淨信菩薩重興哀請當知已得為發起序例如欲説法華先説無量義也二發起序二初略請二正問初中二初請二許今初爾時會中有菩薩名堅淨信從座而起整衣服偏袒右肩合掌白佛言我今於此衆中欲有所問咨請世尊願垂聽許自于一實境界淨信堅固又能令他淨信堅固故名堅淨信菩薩也若分釋者正因名堅緣因名淨了因名信緣了二因同依正因不可破壞故名堅淨信也偏袒右肩者事釋則是表于敬順理解則是表露善權合掌白佛者事釋則是表于一心理解則是權實吻合獨歸大覺咨請聽許者西國常儀欲有所問並須求聽不同此土鹵莽搪揬絶無敬慎禮節也二許佛言善男子隨汝所問便可説之一切智人有問必答降佛以下皆所不能故舍利弗富樓那等有人問時但云我若知者當隨力答耳二正問二初問法二問人初中二初述佛語致問二佛指人為答初又二初正述佛語二為衆致問今初堅淨信菩薩言如佛先説若我去世正法滅後像法向盡及入末世如是之時衆生福薄多諸衰惱國土數亂災害頻起種種厄難怖懼逼繞我諸弟子失其善念唯長貪瞋嫉妬我慢設有像似行善法者但求世間利養名稱以之為主不能專心修出要法爾時衆生覩世災亂心常怯弱憂畏己身及諸親屬不得衣食充養軀命以如此等衆多障礙因緣故於佛法中鈍根少信得道者極少乃至漸漸於三乘中信心成就者亦復甚鮮所有修學世間禪定發諸通業自知宿命者次轉無有如是於後入末法中經久得道獲信禪定通業等一切全無福薄是衰惱厄難之因衰惱厄難是失其善念之緣失念是長貪求利不修出要之因不修出要是怯弱鈍根少信之緣所以非但不能獲一乘實道亦復不能成三乘權信非但不能修出世權實亦復不能修世間禪定通業所謂天人衆減少三惡道充滿也問諸佛菩薩大慈大悲大願大力何以不能救此末劫答譬如赫日當空不能令覆盆之下蒙其光照同在太虗空中自成障隔非赫日之咎也一切衆生亦復如是同在一實境界之中自以無明虗幻覆障故於廣博嚴淨無礙道場妄見惱亂而生憂畏即於如來所證剎那際三昧中妄見遷流而為末世今以慈悲願力請問方便為其作增上緣倘依此法撤去無明覆盆則覩自心本具太空佛日矣二為衆致問我今為此未來惡世像法向盡及末法中有微少善根者請問如來設何方便開示化導令生信心得除衰惱以彼衆生遭值惡時多障礙故退其善心於世間出世間因果法中數起疑惑不能堅心專求善法如是衆生可愍可救世尊大慈一切種智願興方便而曉喻之令離疑網除諸障礙信得增長隨於何乘速獲不退善根深者必於正法像法時世早得度脫不致遭值法盡及末世時無善根者縱令得遇正法像法尚不見聞況在末法何由可度今則正為有少善根值障易退故特求方便以愍救之也由多障礙故可愍由有微少善根故可救大慈則兼愍一切況有少善根者而不愍耶種智則無法不知況此虗妄疑網而難救耶然苟無善根則大慈雖愍而無由可救苟非種智則善根雖有而無由決疑故知感應相關各有全力不出一念仍非共生也隨於何乘者為實施權不得執一速獲不退者開權顯實終無定三也初述佛語致問竟二佛指人為答佛告堅淨信言善哉善哉快問斯事深適我意今此衆中有菩薩摩訶薩名曰地藏汝應以此事而請問之彼當為汝建立方便開示演説誠汝所願一善哉讚其快問斯事下逗羣機一善哉讚其深適我意上契佛旨也萬法由之依持建立故名曰地多所容受而無積聚故名曰藏地即心地能載能生藏即性藏可出去聲可內音納無不從此法界流名之為出無不還歸此法界名之為內又六根六塵六識名為理藏六度四等四攝三十七品名為行藏一一理藏各具行藏則理名為地行名為藏一一行藏並證理藏則行名為地理名為藏又惟是一實境界約持載義名之為地約含容義名之為藏秖一心性體上有此持載含容二義證此體用名地藏也又大集經有日藏月藏須彌藏虗空藏天藏等諸大菩薩各從所觀境而立名如觀察虗空無邊入三摩地名虗空藏今此菩薩觀地獄苦發菩提心證得地獄界之三德祕藏能救十方大地獄苦故名地藏又如大集經中海慧菩薩欲來則衆見大水盈滿虗空藏菩薩欲來則大千世界忽皆不見月藏菩薩欲來則大衆頭上皆現半月地藏菩薩欲來則衆會手中各各現如意珠雨寶放光見十方土又見身各地界增強堅重難舉當知一切依正四大虗空山海日月無非如來藏性一實境界諸佛菩薩隨以一法為所觀境證得此法之實性已即證一切法之實性故一切法皆趣此法即以此法名之為藏也誠如所願誠者實也疑或作成成者滿也初問法竟二問人二初疑問二釋答今初時堅淨信菩薩復白佛言如來世尊無上大智何意不説乃欲令彼地藏菩薩而演説之恐衆有疑故代騰請世尊由此得發迹也二釋答三初總誡二別釋三結答今初佛告堅淨信汝莫生高下想衆生不知本迹無定則必以佛為高菩薩為下皆是妄想分別由此分別不入堅信法門故寄堅淨信以規一切也二別釋二初直明位高二兼明緣勝今初此善男子發心已來過無量無邊不可思議阿僧祇劫久已能度薩婆若海功德滿足但依本願自在力故權巧現化影應十方發心過無量阿僧祇劫明其本因深也度薩婆若功德滿足明其本果高也權巧現化影應十方明其迹用廣大也二兼明緣勝又二初悲勝願二慧辨勝今初雖復普遊一切剎土常起功業而於五濁惡世化蓋偏厚亦依本願力所熏習故及因衆生應受化業故也彼從十一劫來莊嚴此世界成熟衆生是故在斯會中身相端嚴威德殊勝唯除如來無能過者又於此世界所有化業唯除遍吉觀世音等諸大菩薩皆不能及以是菩薩本誓願力速滿衆生一切所求能滅衆生一切重罪除諸障礙現得安隱雖復位高仍須願力熏習雖有願熏又須應受化業故唯識云諸有情類無始時來種性法爾更相繫屬或多屬一或一屬多故所化生有共不共不爾多佛久住世間各事劬勞實為無益一佛能益一切生故當知佛能度脫一切衆生而終不能度無緣者非虗語也普遊一切剎土常起功業是無緣大慈不捨一切也而於五濁惡世化益偏厚是同體大悲尤憫剛強也本願力所熏習謂往昔所發大願衆生度盡方證菩提地獄未空不取正覺也衆生應受化業謂多劫曾結法緣聞名覩影易起信心聆法蒙光能獲果證也遍吉亦名普賢觀世音亦名觀自在此二菩薩亦與此界有大因緣故與地藏大士相同餘大菩薩縱令位高慧勝不讓此三大士而衆生緣淺故皆不能及其化益也二慧辨勝又是菩薩名為善安慰説者所謂巧説深法能善開導初學發意求大乘者令不怯弱即指下文善巧説法及進趣大乘方便占察三種輪相法也二別釋竟三結答以如是等因緣於此世界衆生渴仰受化得度是故我今令彼説之渴仰有世界益受化有為人對治益得度有第一義益即是四悉檀因緣故令説也初序段竟二正説段大分為三初啓請二演説三獲益今初爾時堅淨信菩薩既解佛意已尋即勸請地藏菩薩摩訶薩言善哉救世真士善哉大智開士如我所問惡世衆生以何方便而化導之使離諸障得堅固信如來今者為欲令汝説是方便宜當知時哀愍為説救世真士領佛所明悲願勝也大智開士領佛所明慧辨勝也餘可知二演説有三初從此訖上卷末示占察法二從下卷初至攝修禪定之業有十一紙示進趣義三從爾時堅淨信問至當如是知有三紙半餘示善巧説初示占察法二初誡許二正説今初爾時地藏菩薩摩訶薩語堅淨信菩薩摩訶薩言善男子諦聽當為汝説諦聽是誡辭當説是許辭也聽不審諦則聞慧不生聞慧不生則思修無地三慧是從凡入聖之階梯故須誡也然堅淨信位非凡下何須待誡亦借此以誡一切耳二正説為三初隨機立法二略示勸誡三正示輪相初中二初隨機二立法初又二初明無信力二明有障緣若無障緣則信力雖微或堪向道若具信力則障緣雖甚或可自持今惡世中既乏信力又值障緣所以須立輪法用除疑障也今初若佛滅後惡世之中諸有比丘比丘尼優婆塞優婆夷於世間出世間因果法未得決定信不能修學無常想苦想無我想不淨想成就現前不能勤觀四聖諦法及十二因緣法亦不勤觀真如實際無生無滅等法以不勤觀如是法故不能畢竟不作十惡根本過罪於三寶功德種種境界不能專信於三乘中皆無定向世間因果即苦集二諦十二因緣流轉門出世因果即滅道二諦十二因緣還滅門又修學無常等想勤觀四諦因緣真如實際等法皆是出世之因所觀真如等法及三寶功德皆是出世之果以要言之秖是不能如實觀察十界善惡業報耳又不修學無常苦無我不淨想令其成就現前不能勤觀四聖諦法則於聲聞乘無決定向不能勤觀十二因緣則于緣覺乘無決定向不能勤觀真如等法則于菩薩乘無決定向此皆真實義愚也不能不作十惡過罪乃異熟果愚也由此二愚不信三寶功德境界所以名為末法惡世也又無常等想局在藏教乃厭離之初門四諦十二因緣並通四教如常所明真如實際無生無滅皆是一實境界異名意在圓理不妄名真不異名如不虗名實本位名際無始故無生無終故無滅也三寶功德種種境界亦通四教所謂住持三寶勝義三寶別相三寶一體三寶具如餘處廣明二明有障緣如是等人若有種種諸障礙事增長憂慮或疑或悔於一切處心不明了多求多惱衆事牽纏所作不定思想繞亂廢修道業既無專信又遇障緣所以疑悔纏心不能修道須藉輪相以決疑也初隨機竟二立法三初示所用法二示所依理三示能除疑初示所用法謂木輪相也解在下文有如是等障難事者當用木輪相法占察善惡宿世之業現在苦樂吉凶等事占察善惡指第一輪相占察宿世之業指第二輪相占察現在苦樂吉凶等事指第三輪相也二示所依理緣合故有緣盡則滅業集隨心相現果起不失不壞相應不差此明所立三種輪相全依無性緣生緣生無性之理而得成也善惡業報本是般若解脫法身三德祕藏總名一實境界由此真如無性舉體隨緣故染淨迷悟之緣合時便有十界善惡業報差別不同所謂因緣和合虗妄有生也緣生之法剎那不住初生即有滅不為愚者説由諸凡愚不了無性恆起生緣妄見諸法相似相續其實生已無間即滅故云緣盡則滅所謂因緣別離虗妄名滅也然緣生之法雖即無性而隨心善惡念念相續則十界之業隨心積集業既積集便有相現業相既現果報必起因果相酬終不失壞所謂無我無造無受者善惡之業亦不亡如響應聲如影隨形故相應不差也三示能除疑如是諦占善惡業報曉喻自心於所疑事以取決了三種輪相表示自心無性緣生善惡業報故諦占之便能曉喻自心以決疑也初隨機立法竟二略示勸誡二初勸學習二誡學他今初若佛弟子但當學習如此相法至心歸依所觀之事無不成者如此相法依于無性緣生甚深道理故當學習不可妄生疑二故云至心歸依也二誡學他不應棄捨如是之法而返隨逐世間卜筮種種占相吉凶等事貪著樂習若樂習者深障聖道世間卜筮等法不知依于一實境界不能表示無性緣生不説一切皆自心現故樂習者深障聖道以其或計邪因或計無因終不能知正因緣法故也二略示勸誡竟三正示輪相二初總示二別示初中三初示相二示義三示用今初善男子欲學木輪相者先當刻木如小指許使長短減於一寸正中令其四面方平自餘向兩頭斜漸去之仰手傍擲令使易轉因是義故説名為輪共十九輪皆用此式也長可九分方可三分須用香木二示義又依此相能破壞衆生邪見疑網轉向正道到安隱處是故名輪示正因緣故破邪見顯示善惡業報差別故壞疑網令行八聖道中得到涅槃最安隱處也三示用其輪相者有三種差別何等為三一者輪相能示宿世所作善惡業種差別其輪有十二者輪相能示宿世集業久近所作強弱大小差別其輪有三三者輪相能示三世中受報差別其輪有六下文自解不必先釋一之與二皆云宿世者並約過去所熏種子即以過去名為宿世不必獨指前生也蓋善惡現行剎那即滅所熏種子在藏識中不失不壞第一輪相但觀善惡種子有無第二輪相乃觀善惡業力強弱也第三遍示三世報者如下文百六十數明現在報次十一數明過去報後十八數明未來報也初總示竟二別示三初示第一輪相二示第二輪相三示第三輪相初中三初正示輪相二詳示占法三占後誡勸初又二初直明輪相二明輪相所以今初若欲觀宿世作善惡業差別者當刻木為十輪依此十輪書記十善之名一善主在一輪於一面記次以十惡書對十善令使相當亦各記在一面每輪各有四面一面書善一面書惡令使相對則餘兩面皆空故使善惡有現有不現也二明輪相所以言十善者則為一切衆善根本能攝一切諸餘善法言十惡者亦為一切衆惡根本能攝一切諸餘惡法十善為衆善根本者果德萬善皆由十善而生也能攝一切諸餘善法者不惟生一切善亦即攝一切善更無餘也且如不殺則有事不殺理不殺等乃至瞋癡亦然故曰唯佛一人持淨戒其餘皆名汙戒者十善為法界一切法皆趣十善是趣不過也又散心十善即波羅提木叉戒定心十善即禪戒出世十善即無漏戒止一切惡即律儀戒具一切善即攝善法戒利一切衆生即饒益有情戒戒為法界一切法趣戒也十惡為衆惡根本者一切惡業身口七支攝無不盡並由貪瞋癡三不善根而起此三即攝一切根隨煩惱慢是貪攝疑及五見並屬癡攝忿恨惱嫉害皆即瞋分覆誑與諂皆貪癡分慳之與憍皆即貪分無慚無愧並是癡攝掉舉放逸散亂並等分攝惛沈不信懈怠失念及不正知並是癡攝故云能攝一切諸餘惡法也問若約圓融為語則秖一善字已攝百界千如皆盡秖一惡字亦攝百界千如皆盡今既善惡對論則無記品業如何相攝答若欲攝者則有覆無記攝入惡品是染汙故無覆無記攝歸善品是白淨故今輪相意則取能招樂異熟者名為善種能招苦異熟者名為惡種二種無記但能招等流果不招苦樂異熟故以不現表之又無漏善能得離繫不感異熟亦以不現表之初正示輪相竟二詳示占法三初明依法自占二明以自例他三明占已詳察初中五初敬禮立願二廣修供養三別供稱名四至誠啓白五正擲輪相今初若欲占此輪相者先當學至心總禮十方一切諸佛因即立願願令十方一切衆生速疾皆得親近供養咨受正法次應學至心敬禮十方一切法藏因即立願願令十方一切衆生速疾皆得受持讀誦如法修行及為他説次當學至心敬禮十方一切賢聖因即立願願令十方一切衆生速疾皆得親近供養發菩提心至不退轉後應學至心禮我地藏菩薩摩訶薩因即立願願令十方一切衆生速得除滅惡業重罪離諸障礙資生衆具悉皆充足至心禮佛法僧及我地藏一一皆云學者上則普緣十方三寶下乃普為十方衆生即是悲智並運須達一心無作四弘故當學也學此無作四弘方名至心有此至心方成感應何者悟此現前一念心性則為十方三寶及地藏尊迷此現前一念心性則為十方一切衆生迷悟總不離於一心秖就一心而論迷悟迷為無作苦集如水成冰悟為無作道滅冰還成水能覺名為佛所覺名為法能所不二名為僧三寶是一切法依持名為地一切法總不出於三寶名為藏求契此理名為至心敬禮以此益他名為因即立願也二廣修供養二初明供具二明觀想供具秖可隨緣觀想則須稱性也今初如是禮已隨所有香華等當修供養三寶離障清淨不受諸受損之不瞋供之不喜而惡心毀謗則自受其殃如仰天唾還墜己身好心供養則自取其福如染香人身有香氣故須修供養也但云隨所有者有而不供則為慳鄙無而強營則妨正業故秖令隨力隨分蓋物無大小大小由心心大則少施亦福等虗空心小則多施亦終成有漏譬如滿屋琉璃不及摩尼一粒所以貧士一燈勝闍王之千炷五莖蓮供超多劫之事檀良以一切供物皆是因緣生法當體無不即空假中達之則事隨理遍迷之則理被事局也供必用香華者香則然之而任運騰空表無作善華則散之而始周法界表有作善又香以表戒華以表慧現前一念心性正理不動本即那伽大定戒慧二種共莊嚴之即是緣了二因助顯正因一性也二明觀想二初修供觀二利益觀初中二初稱性總觀二緣境別觀初又二初解所供體遍二達能供性遍今初修供養者憶念一切佛法僧寶體常遍滿無所不在佛是能覺法是所覺僧是能所從來不二此自心一體三寶也徹證一體三寶者名為佛詮顯一體三寶者名為法修行一體三寶者名為僧此自心住持三寶也此心無始無終故常此心無分無劑故遍此心無間無缺故滿此心豎窮橫遍莫載莫破故無所不在自心既常遍滿無所不在一切佛法僧寶皆以此心為體則亦體常遍滿無所不在矣非由憶念使然但以憶念而照了之二達能供性遍願令以此香華等同法性普熏一切諸佛剎土施作佛事秖此一香一華本從法性隨緣顯現並具法性全體功能非是少分以法性本來無分劑故不可割裂分剖故若知香華本同法性之體則必等同法性之用故可普熏一切諸佛剎土上供三寶又可施作佛事下度羣生也斯則性雖自爾必須願力方成稱性之功初稱性總觀竟二緣境別觀者雖復一香一華已能稱性周遍而由願王無盡心無厭足故須別別遍緣一切供具一切衆生又須別別想能供身所供三寶各各互遍無盡重重重重無盡方入普賢廣大供養法門海也文分為三初念供養具遍二願能供身遍三所供三寶遍初又二初念遍用供具二想遍同衆生今初又念十方一切供具無時不有我今當以十方所有一切種種香華瓔珞幢幡寶蓋諸珍妙飾種種音樂燈明燭火飲食衣服臥具湯藥乃至盡十方所有一切種種莊嚴供養之具問十方供具各有所屬若實用之寧不犯盜若不實用何名供養答若約圓宗則十方供具並我一念心中所現之物若約唯識則是第八識上共相識種所變器界相分今還用我自識相分何名犯盜如是了達唯識而修供養即名真實法供何名不實若依真諦則雖手執香華翹勤施供亦豈有實用耶夫心念五逆雖不動身發口亦必有罪心念供養雖不燒香散華亦豈無福況令于一念中想用十方供具便可破我法二執顯同體慈悲又不止于迷情空想而已思之修之二想遍同衆生又三初想同供二念隨喜三願開導今初憶想遙擬普共衆生奉獻供養二念隨喜常念一切世界中有修供養者我今隨喜三願開導若未修供養者願得開導令修供養普共奉獻供養即遍現在隨喜已修供養即遍過去開導未修供養即遍未來所謂念念相續無有間斷身語意業無有疲厭也初念供養具遍竟二願能供身遍又願我身速能遍至一切剎土於一一佛法僧所各以一切種莊嚴供養之具共一切衆生等持奉獻凡夫妄認四大為自身相則逼局而不能遍二乘妄計無常無我不淨苦空則趣寂而無可遍今直觀身性即是法性法性遍故身亦隨遍也夫一身所念供具所同衆生已自豎窮橫遍況無盡身各以無盡供養之具各共一切無盡衆生等持奉獻則豈不無雜無障礙耶三所供三寶遍供養一切諸佛法身色身舍利形像浮圖廟塔一切佛事供養一切所有法藏及説法處供養一切賢聖僧衆法身者所證之理也色身者自受用報具不思議微妙色心所謂究竟常住五蘊舉色以該心也舍利者化身所留之靈骨形像者肖彼化身之相好浮圖廟塔一切佛事者供彼舍利形像之莊嚴若達因緣生法即空假中則一一舍利及形像等三身宛然四德無減況復色身及法身耶法僧可知夫稱性修觀則一香一華已足遍供三寶況盡十方所有供具以為供養況復隨喜開導一切衆生咸修供養況復我身遍至一切剎土一一供具各遍供養一切三寶可謂重重無盡無盡重重矣初修供觀竟二利益觀攝前總別二供養觀回向令成二種莊嚴也又為二初願成功德莊嚴二願成智慧莊嚴以此全性所起二修還用莊嚴一性今初願共一切衆生修行如是供養已漸得成就六波羅蜜四無量心捨諸所有即成就施清淨無染即成就戒心無瞋惱即成就忍離諸懈怠即成就進離雜亂垢即成就禪離諸暗蔽即成就般若令他得樂即慈無量令他離苦即悲無量慶他得樂即喜無量心常平等無有怨親即捨無量隨一修供即能成就此十法門亦自圓攝一切二利功德二願成智慧莊嚴深知一切法本來寂靜無生無滅一味平等離念清淨畢竟圓滿本來寂靜無生無滅一味平等謂一切法即中一切種智也離念清淨謂一切法即空一切智也畢竟圓滿謂一切法即假道種智也一心三智深知一切諸法無非三諦自覺覺他俱不出此妙觀矣二廣修供養竟三別供稱名又應別復係心供養我地藏菩薩摩訶薩以當稱名若默誦念一心告言南無地藏菩薩摩訶薩如是稱名滿足至千雖已普供三寶而我地藏正為行人決疑之主故應係心別供也稱名須至千念者令積善根成機感故亦表一念具千法故四至誠啓白經千念已而作是言地藏菩薩摩訶薩大慈大悲惟願護念我及一切衆生速除諸障增長淨信令今所觀稱實相應雖為自決所疑必云及一切衆生者念念不忘衆生乃可扣感菩薩大慈悲也五正擲輪相作此語已然後手執木輪於淨物上而傍擲之初明依法自占竟二明以自例他如是欲自觀法若欲觀他皆亦如是應知初心之人未知宿命故須自觀以決疑悔未得他心道眼故欲觀他亦須依前五法也三明占已詳察不論自觀觀他並須如此諦察也又二初明所現二明不現今初占其輪相者隨所現業悉應一一諦觀思驗或純具十善或純具十惡或善惡交雜或純善不具或純惡不具如是業因種類不同習氣果報各各別異如佛世尊餘處廣説應當憶念思惟觀察所現業種與今世果報所經苦樂吉凶等事及煩惱業習得相當者名為相應若不相當者謂不至心名虗謬也所現業種謂輪上所現或善或惡也要與今世果報相當或與煩惱業習相當乃名相應否則由不至心故名虗謬如現不殺今應無病常壽或有慈心若現不盜今應無所乏少或常知足等又如現殺今應多病多惱或常懷殺意若復現盜今應少財或常失脫或常懷盜意等一一須自思驗不可盡述也二明不現又二初俱不現二有所不現今初若占輪相其善惡業俱不現者此人已證無漏智心專求出離不復樂受世間果報諸有漏業展轉微弱更不增長是故不現無漏智心謂初果八忍八智通見地別初住圓初信已斷三界分別惑種不復更造招後有業縱有舊熏業種漸就羸損不增長也或圓五品圓伏煩惱當捨同居穢土生同居淨雖未證無漏智亦可善惡兩俱不現以圓觀力強故二有所不現又純善不具純惡不具者此二種人善惡之業所有不現者皆是微弱未能牽果是故不現善業種強則能招樂異熟惡業種強則能招苦異熟若微弱種猶須待潤未即牽果故不現也準此則有覆無覆兩種無記不名善惡明矣二詳示占法竟三占後誡勸若當來世佛諸弟子已占善惡果報得相應者於五欲衆具得稱意時勿當自縱以起放逸誡也即應思念由我宿世如是善業故今獲此報我今乃可轉更進修不應休止勸也若遭衆厄種種衰惱不吉之事繞亂憂怖不稱意時應當甘受無令疑悔退修善業誡也即當思念但由我宿世造如是惡業故今獲此報我今應當悔彼惡業專修對治及修餘善無得止住懈怠放逸轉更增集種種苦聚勸也是名占察初輪相法此中共有兩番誡勸初番為稱意者誡勿放逸勸更進修次番為不稱意者誡勿退悔勸修諸善也初示第一輪相竟二示第二輪相三初正示輪相二詳示占法三別明懺法初中三初示相二示義三功能今初善男子若欲占察過去往昔集業久近所作強弱大小差別者當復刻木為三輪以身口意各主一輪書字記之又於輪正中一面書一畫令粗長使徹畔次第二面書一畫令細短使不至畔次第三面作一傍刻如畫令其粗深次第四面亦作傍刻令使細淺二示義當知善業莊嚴猶如畫飾惡業衰害猶如損刻其畫長大者顯示積善來久行業猛利所作增上其畫細短者顯示積善來近始習基鈍所行微薄其刻粗深者顯示習惡來久所作增上餘殃亦厚其刻細淺者顯示退善來近始習惡法所作之業未至增上或雖起重惡已曾改悔此謂小惡大善小善大惡各有二義大善二者一或積久二或猛利增上小善二者一或未久二或所作微薄大惡二者一或積久二或所作增上也小惡則有三義一或未久二或未至增上三或已曾改悔轉重令輕也大善大惡能順現受及與生受小善小惡能順後受或更潤之可順生受或更損之可不定受初輪相中所不現者則是不定受業也又凡無漏智起則一切生受後受業種皆可摧滅惟除順現受業未能全滅亦能轉重令輕三功能善男子若占初輪相者但知宿世所造之業善惡差別而不能知積習久近所作之業強弱大小是故須占第二輪相初正示輪相竟二詳示占法二初明占二明察今初若占第二輪相者當依初輪相中所現之業若屬身者擲身輪相若屬口者擲口輪相若屬意者擲意輪相不得以此三輪之相一擲通占應當隨業主念一一善惡依所屬輪別擲占之一一善惡皆須主念別占如身之善惡若有三現則須別擲三次口四意三亦皆爾也所不現者則不須擲二明察復次若占初輪相中唯得身之善於此第二輪相中得身惡者謂無至心不得相應名虗謬也又復不相應者謂占初輪相中得不殺業及得偷盜業意先主觀不殺業而於第二輪相中得身惡者名不相應復次若觀現在從生以來不樂殺業無造殺罪但意主觀欲殺業而於此第二輪相中得身大惡者謂名不相應自餘口意中業不相應義亦如是應知二詳示占法竟三別明懺法三初明應修懺悔二正示懺悔法三明得清淨相今初善男子若未來世諸衆生等欲求度脫生老病死始學發心修習禪定無相智慧者應當先觀宿世所作惡業多少及以輕重若惡業多厚者不得即學禪定智慧應當先修懺悔之法所以者何此人宿習惡心猛利故於今現在必多造惡毀犯重禁以犯重禁故若不懺悔令其清淨而修禪定智慧者則多有障礙不能尅獲或失心錯亂或外邪所惱或納受邪法增長惡見是故當先修懺悔法若戒根清淨及宿世重罪得微薄者則離諸障業性雖空果報不失故須熏習懺悔善力令彼惡種展轉微弱更不增長方堪修習禪慧不遭邪慮也二正示懺悔法二初明懺儀二明懺期初中二初廣明晝時佛事二略示夜時佛事初文共有九意初明嚴淨道場二明香華供養三明清淨三業四明稱名敬禮五明説罪懺悔六明發勸請願七明發隨喜願八明發回向願九明稱念名號詳夫法華方等請觀音金光明大悲淨土種種儀法皆是四依大士倚傍經文取意斟酌方立十科未有若此經之分明現成不假斟酌者但乏初時啓請一科耳向曾然香懇祝拈取決乃敢增入誓不敢一字穿鑿也初明嚴淨道場善男子欲修懺悔法者當住靜處隨力所能莊嚴一室內置佛事及安經法懸繒幡蓋密部壇儀極令嚴飾今但言隨力所能者曲為末世助緣缺乏之人也佛事即佛菩薩形像或塑或畫皆無不可經法即指此經或餘大乘法寶亦無不可懸繒幡蓋以為莊嚴或錦或帛或復紙素並可隨力也二明香華供養求集香華以修供養準餘行法每時皆須燒香散華如前所明觀想法也此逐文便故在第二準行次第決在淨三業後三明清淨三業澡浴身體及洗衣服勿令臭穢此亦如餘行法每大便時必換衣洗浴浴竟著清淨衣方可入壇行道也四明稱名敬禮於晝日分在此室內三時稱名一心敬禮過去七佛及五十三佛次隨十方面一一總歸擬心遍禮一切諸佛所有色身舍利形像浮圖廟塔一切佛事次復總禮十方三世所有諸佛又當擬心遍禮十方一切法藏次當擬心遍禮十方一切賢聖然後更別稱名禮我地藏菩薩摩訶薩五明説罪懺悔如是禮已應當説所作罪一心仰告惟願十方諸大慈尊證知護念我今懺悔不復更造願我及一切衆生速得除滅無量劫來十惡四重五逆顛倒謗毀三寶一闡提罪復應思惟如是罪性但從虗妄顛倒心起無有定實而可得者本唯空寂願一切衆生速達心本永滅罪根説所作罪謂今生所作一切惡業或輪相中所現大惡並須發露披陳也此于逆生死流十心之中由三種心生五種心并下勸請隨喜等則共成十心也由第一深信因果第二生大慚愧第三生大怖畏故今説所作罪即第四發露懺悔也不復更造即第五斷相續心願我及一切衆生速得除滅十惡四重等即第六發菩提心及第七翻昔重過思惟罪性等即第十今知空寂下文勸請即第九念十方佛隨喜即第八隨喜諸善回向亦兼第六第七并第十意也過去惡業若論現行則剎那已滅但所熏種子藏在第八識中由六七二識我執力故念念資熏令得增長今之發露正是破除我執前茅如草木種子潛在地中必發芽莖今既掘露則自損壞又舊種雖復發露若不永斷相續則新熏種子能與舊種互相資益展轉生長無有已時故須誓不更造又向由我執妄分我人所作之罪無不損惱同體衆生譬如一身之中兩手互傷自遭痛苦今破虗妄我執故代衆生普除衆罪終不如獐獨跳也又此罪性但從虗妄顛倒心起不在內外中間諸處過去已滅現在不住未來未有十方三世仔細推求無有定實而可得者如彼翳眼所見空華華體本來惟是空寂不達本空增無明翳念念觀知本性空寂不復瞪目分別空華則翳病漸除華亦漸減乃至目勞既息華相自亡故云速達心本永滅罪根也觀罪性空名實相懺名無生懺亦名大莊嚴懺即是唯心識觀真如實觀不可不知六明發勸請願次應復發勸請之願願令十方一切菩薩未成正覺者願速成正覺若已成正覺者願常住在世轉正法輪不入涅槃勸請能滅魔障故亦名悔魔王波旬於坐道場菩薩每欲障令不得成道於佛轉法輪時每欲興心破壞又每請佛速入涅槃今勸請成道勸久住世勸轉法輪即翻破彼三種惡也觀心釋者菩薩是自心諸善心所魔是自心諸惡心所今令諸善心所與無漏慧相應名為速成正覺念念恆無間斷名為常住不滅轉化餘心心所名為轉正法輪七明發隨喜願次當復發隨喜之願願我及一切衆生畢竟永捨嫉妬之心於三世中一切剎土所有修學一切功德及成就者悉皆隨喜隨喜滅嫉妬障故亦名悔一切諸佛三乘聖衆六道凡夫並皆在我現前一念心中同一體性本無彼此由我執故妄計自他而生嫉妬今悔此過深于一切凡聖平等起隨喜心則是攬法界善以為己善其善乃大豈必獨自運心動身口業以為善哉現見他人携燈亦蒙其照他人然香亦被其熏同體善根分明若此奈何癡障不知承荷反生嫉妬耶若能隨喜則知諸佛菩薩所修善根本與一切衆生共之我原有分非俟強求故大佛頂經云十方如來所有功德悉與此人常與諸佛同生一處無量功德如惡叉聚同處熏修永無分散又經言菩薩若知諸佛所有功德即是己功德者是為奇特之法又經言與一切菩薩同一善根藏又大乘止觀云行者當知諸佛菩薩二乘聖人凡夫人天等所作功德皆是己之功德是故應當隨喜噫可以悟矣八明發回向願次當復發回向之願願我所修一切功德資益一切諸衆生等同趣佛智至涅槃城回向能滅著三有障故亦名悔資益一切即回自向他同趣佛智即回因向果至涅槃城即回事向理也回事向理名為直心回因向果名為深心回自向他名大乘心直心顯斷德法身深心成智德般若大乘心成恩德解脫全性起修全修在性始終不離祕密藏矣九明稱念名號如是發回向願已復往餘靜室端坐一心若稱誦若默念我之名號當減省睡眠若惛蓋多者應於道場室中旋繞誦念但令一心稱誦默念名號者正為惡業多厚不可即修禪定智慧也然而若坐若旋一心稱念即是真實禪定智慧方便由我地藏萬德洪名詮召果上真實功德能與衆生作增上緣令念念中滅罪除障故也如法華及大佛頂經皆云持六十二億恆河沙諸法王子名號與持觀世音一名功德正等無異又大乘十輪經云假使有人於其彌勒及妙吉祥并觀自在普賢之類於百劫中至心歸依稱名念誦禮拜供養求諸所願不如有人於一食頃至心歸依稱名念誦禮拜供養地藏菩薩求諸所願速得滿足所以者何如是大士為欲成熟諸有情故久修堅固大願大悲勇猛精進過諸菩薩是故汝等應當供養今以二意釋之一者平等意趣則六十二億所證法性與一大士所證平等百劫至心所契法性與一食頃所契平等二者差別意趣則此土衆生與六十二億大士所有因緣不若觀音大士因緣最深與觀世音大士所有因緣又不若地藏大士因緣更深也又所稱之名無論解與不解本是一境三諦能稱之念無論達與不達本即一心三觀又所稱之名雖即三諦而歷然分明即不思議假能稱之念雖即三觀而覓不可得即不思議空能外無所所外無能雙忘雙照即不思議中又名因念有念外無名即是惟心識觀能念所念當體絶待不生不滅常住一心即是真如實觀又一心即是禪定稱念即是智慧圓教名字位人雖已解了能稱所稱無非法界猶有無始事障力強須藉洪名以為繫心之境漸漸令除散昏二蓋正所謂繫緣法界一念法界者也圓人受法無法不圓豈可藐視持名以為權淺行耶初晝時佛事竟二略示夜時佛事次至夜分時若有燈燭光明事者亦應三時恭敬供養悔過發願若不能辦光明事者應當直在餘靜室中一心誦念能辦燈燭則同日時行道若不能辦但令一心持名大慈大悲曲為乏助緣者開此易行方便也初明懺儀竟二明懺期日日如是行懺悔法勿令懈廢若人宿世遠有善基暫時遇惡因緣而造惡法罪障輕微其心猛利意力強者經七日後即得清淨除諸障礙如是衆生等業有厚薄諸根利鈍差別無量或經二七日後而得清淨或經三七日乃至或經七七日後而得清淨若過去現在俱有增上種種重罪者或經百日而得清淨或經二百日乃至或經千日而得清淨若極鈍根罪障最重者但當能發勇猛之心不顧惜身命想常勤稱念晝夜旋繞減省睡眠禮懺發願樂修供養不懈不廢乃至失命要不休退如是精進於千日中必獲清淨獨行則以得清淨相為期若十人結制晝夜六時則一七三七或七七等亦無不可高明者自能酌之二正示懺悔法竟三明得清淨相三初明相依輪顯二明隨求尅獲三明至心為因初中三初正明依輪二兼明餘相三簡非今初善男子若欲得知清淨相者始從修行過七日後當應日日於晨朝旦以第二輪相具安手中頻三擲之若身口意皆純善者名得清淨不論大善小善但三擲俱善無惡即名清淨也二兼明餘相如是未來諸衆生等能修行懺悔者從先過去久遠以來於佛法中各曾習善隨其所修何等功德業有厚薄種種別異是故彼等得清淨時相亦不同或有衆生得三業純善時即更得諸餘好相或有衆生得三業善相時於一日一夜中復見光明遍滿其室或聞殊特異好香氣身意快然或作善夢夢見佛身來為作證手摩其頭歎言善哉汝今清淨我來證汝或夢見菩薩身來為作證或夢見佛形像放光而為作證正得清淨輪相兼得種種感應故是善根發現也三簡非若人未得三業善相但先見聞如此諸事者則為虗妄誑惑詐偽非善相也輪相一法乃地藏大士威神之所建立依法而求決無虗謬既未獲清淨相或先見光聞香得奇好夢總屬魔事不可被其誑惑也初明相依輪顯竟二明隨求尅獲三初明得禪慧二明得離惱三明得淨戒初又二初明顯益二明冥益今初若人曾有出世善基攝心猛利者我於爾時隨所應度而為現身放大慈光令彼安隱離諸疑怖或示神通種種變化或復令彼自憶宿命所經之事所作善惡或復隨其所樂為説種種深要之法彼人即時於所向乘得決定信或漸證獲沙門道果二明冥益復次彼諸衆生若雖未能見我化身轉變説法但當學至心使身口意得清淨相已我亦護念令彼衆生速得消滅種種障礙天魔波旬不來破壞乃至九十五種外道邪師一切鬼神亦不來亂所有五蓋展轉輕微堪能修習諸禪智慧或宜顯應得益或宜冥應得益並由自善根力並由菩薩知機妙智苟能信此則專心禮拜懺悔復何疑哉初明得禪慧竟二明得離惱復次若未來世諸衆生等雖不為求禪定智慧出要之道但遭種種衆厄貧窮困苦憂惱逼迫者亦應恭敬禮拜供養悔所作惡恆常發願於一切時一切處勤心稱誦我之名號令其至誠亦當速脫種種衰惱捨此命已生於善處縱不發心出世亦令得世間益所謂小草亦蒙潤澤也若依權教則是為闡提人説十善法若依實義則是循循善誘究竟亦令漸入佛道矣三明得淨戒又二初明懺重得受二明無師得受今初復次未來之時若在家若出家諸衆生等欲求受清淨妙戒而先已作增上重罪不得受者亦當如上修懺悔法令其至心得身口意善相已即應可受在家或破終身五戒中四重或破一日一夜八戒中四重或破菩薩戒中十重出家或破沙彌及尼戒中四重或破式叉摩那法中四重或破比丘及尼戒中四重並名邊罪屬重難攝故名增上重罪若依律藏不許懺悔不得重受一切戒品若依梵網須以得見好相為期今依此經則以得清淨輪為期也又七逆等亦名增上重罪雖梵網經亦不許其受戒若依此經求得清淨輪相即應可受尤為格外洪慈二明無師得受又二初明菩薩三聚戒二明五衆木叉戒今初若彼衆生欲習摩訶衍道求受菩薩根本重戒及願總受在家出家一切禁戒所謂攝律儀戒攝善法戒攝化衆生戒而不能得善好戒師廣解菩薩法藏先修行者應當至心於道場內恭敬供養仰告十方諸佛菩薩請為師證一心立願稱辨戒相先説十根本重戒次當總舉三種戒聚自誓而受此亦得戒摩訶衍此云大乘欲行大乘菩薩之道須受菩薩三聚淨戒即梵網十重四十八輕戒也此菩薩戒普通在家二衆出家五衆皆可受持故名在家出家一切禁戒若千里內有授戒師理應從受若無先解先修行者便可自受若先已作增上重罪須求清淨輪相方可誓受若今生無增上重罪便可於道場內請佛菩薩以為師證自誓得戒此同地持瓔珞二經重在發菩提心不同梵網制令見好相也二明五衆木叉戒又二初明得二簡不得初又二初明年滿者得二衆戒二明年不滿者先得三小衆戒今初復次未來世諸衆生等欲求出家及已出家若不能得善好戒師及清淨僧衆其心疑惑不得如法受於禁戒者但能學發無上道心亦令身口意得清淨已其未出家者應當剃髮被服法衣如上立願自誓而受菩薩律儀三種戒聚則名具獲波羅提木叉出家之戒名為比丘比丘尼即應推求聲聞律藏及菩薩所習摩德勒伽藏受持讀誦觀察修行比丘比丘尼戒關係僧輪至尊至貴故雖無增上罪亦須求得清淨輪相方可承當不同菩薩戒也又設有如法戒師僧衆而不從受便自出家則成盜法重難今既僧輪久廢誓續住持故須學發無上道心方堪感得清淨輪相若依瑜伽論説則像法既盡便不復發無作律儀彼是隨情今乃隨智無違妨也摩德勒伽此云智母即是菩薩論藏先求聲聞律藏次及菩薩論藏則所重可知矣二明年不滿者先得三小衆戒若雖出家而其年未滿二十者應當先誓願受菩薩十根本戒及受沙彌沙彌尼所有別戒既受戒已亦名沙彌沙彌尼即應親近供養給侍先舊出家學大乘心具受戒者求為依止之師請問教戒修行威儀如沙彌沙彌尼法雖得清淨輪相未滿二十尚不許即承當比丘足顯比丘戒之尊矣先誓願受十根本戒及受沙彌沙彌尼別戒可見受菩薩戒仍得誓為沙彌豈沙彌等不得先受菩薩戒耶問既有先舊大乘具受戒者何不依之受戒而乃自誓受耶答此有三意一者或此先舊行頭陀行不肯度人二者或此先舊未滿十夏未為和尚三者或先求輪相時未遇此人得清淨後乃遇見之若不能值如是之人唯當親近菩薩所修摩德勒伽藏讀誦思惟觀察修行應勤供養佛法僧寶未滿二十未成比丘故但許學菩薩論藏未許推求聲聞律藏也故知未受具人輒先閲律深為不可已受具人不學律藏尤所不應若沙彌尼年已十八者亦當自誓受毗尼藏中式叉摩那六戒之法及遍學比丘尼一切戒聚其年若滿二十時乃可如上總受菩薩三種戒聚佛因女人根鈍故沙彌尼年十八已先令與其二年學戒名為式叉摩那此翻學戒女也當其得清淨相已誓願受菩薩十重及受沙彌尼戒今年十八則自加受式叉六戒六戒在律藏中不必預列至年二十乃受比丘尼戒此比丘尼所有具戒亦屬菩薩三聚戒攝菩薩毗尼猶如大海悉攝一切諸毗尼故須于菩薩戒中自辨七衆差別一一不得紊亂若此然後得名比丘比丘尼此總結若男若女設于年未滿二十時先得清淨輪相則男止名沙彌女亦止名為沙彌尼或名式叉摩那至年二十乃名比丘比丘尼也菩薩所示學戒法式一遵律制如此後之弘律學者漠然不知哀哉哀哉初明得竟二簡不得若彼衆生雖學懺悔不能至心不獲善相者設作受想不名得戒五衆木叉非依師僧如法受得則須依于清淨輪相乃得不同菩薩戒品但依菩提心得也二明隨求尅獲竟三明至心為因二初問二答今初爾時堅淨信菩薩摩訶薩問地藏菩薩摩訶薩言所説至心者差別有幾種何等至心能獲善相二答地藏菩薩摩訶薩言善男子我所説至心者略有二種何等為二一者初始學習求願至心二者攝意專精成就勇猛相應至心得此第二至心者能獲善相此第二至心復有下中上三種差別何等為三一者一心所謂係想不亂心住了了二者勇猛心所謂專求不懈不顧身命三者深心所謂與法相應究竟不退若人修習此懺悔法乃至不得下至心者終不能獲清淨善相是名説占第二輪法初始學習求願至心未離散動未伏障種乃名字初心故未能獲清淨輪相第二種中下至心者即是攝意專精能得欲界細住或是初隨喜品或是名字後心故亦可得清淨輪相多是冥益中至心者即是成就勇猛須在觀行後心多分兼得諸餘好相上至心者即是相應至心須在相似初心能感菩薩現身説法故得究竟不退也然應之冥顯亦不須論但必第三至心方證不退則前二種雖獲善相急須修行禪定智慧令與二觀相應可矣不然故業雖滅新業還生亦可懼也二示第二輪相竟三示第三輪相三初正示輪相二詳示占法三勸修至心初中二初明相二明義今初善男子若欲占察三世中受報差別者當復刻木為六輪於此六輪以一二三四五六七八九十十一十二十三十四十五十六十七十八等數書字記之一數主一面各三面令數次第不錯不亂輪各四面今各書三數則空一面不書乃得有不現者也以十八數次第書于六輪不可錯亂二明義當知如此諸數皆從一數而起以一為本如是數相者顯示一切衆生六根之聚皆從如來藏自性清淨心一實境界而起依一實境界以之為本所謂依一實境界故有彼無明不了一法界謬念思惟現妄境界分別取著集業因緣生眼耳鼻舌身意等六根以依內六根故對外色聲香味觸法等六塵起眼耳鼻舌身意等六識以依六識故於色聲香味觸法中起違想順想非違非順等想生十八種受諸數皆從一數而起者單一則不成數一與一為二二與一為三三與一為四四與一為五乃至展轉無窮無不從一起也以一為本者對一名二而二之體仍即是一對二名三而三之體亦仍是一對三名四而四之體亦仍是一對四名五而五之體亦仍是一乃至展轉無窮無不當位各仍是一也如來藏自性清淨心一實境界以無二故亦本非數無明不了謬念思惟現妄境界則成見相二分譬如揑目妄覩二月所謂一與一為二亦所謂無同異中熾然成異也謂二月妄別立一月為真所謂二與一為三亦所謂異彼所異因異立同也真妄相對既已成三則必更立非真非妄所謂三與一為四亦所謂同異發明因此復立無同無異也謂四句可説皆妄則必別立不可説句所謂四與一為五亦所謂如是擾亂相待生勞也從此遂至不可窮詰何非從一而起乎又只此無盡妄數一一當位體常是一皆即如來藏自性清淨心一實境界以為其體更無別體故云以一為本也然無生而妄見有生則一為生之始無成而妄見有成則六為成之始儒者不了謬云天一生水地六成之不知吾心一念妄動故不覺從一有五非心外果有天也又由吾心一念妄靜與妄動合故不覺遂成六根非心外果有地也何以言之妄動者即能分別之見分所謂謬念思惟也妄靜者即所取著之相分所謂現妄境界也思惟為能生境界為能成一得五而成六生水即為耳根二得五而成七生火即為舌根三得五而成八生木即為眼根四得五而成九生金即為鼻根五得五而成十生土即為身根總攬五根五塵以為相分即為意根六根頓成實無次第先後但依妄想約數説耳根塵相對而起六識識之見分還熏心種識之相分還熏色種種恆生現現恆熏種由其集業有善不善非善不善三類差別所熏種子至成熟位報得現行六塵境界各各有違有順及非違順違名苦受酬不善因順名樂受酬彼善因非違非順名為捨受酬彼非善不善無記之因今以六輪表示六根六塵六識以十八數表十八受並從迷于一實境界而起則知心外無法不墮邪因及無因論又顯六根塵識及十八受皆依一實境界以之為本則知全妄即真可悟惟心及真如觀矣此中依文似是先有一實境界次有無明次有妄境次因集業方有六根依根取塵方有六識實則語不頓彰説有先後非果有次第也設爾則六根六識未起之前先有無明此無明當與何等心王相應耶今謂八識及諸心數之性名為一實境界無始以來從未悟故名為根本無明此根本無明秖是第七識相應之微細法執及我執耳因此法執我執方于第八識體頓現根身器界由根境為緣方發六識現行而其六識種子並是無始本具非後方生也初正示輪相竟二詳示占法二初明自占二明為他初中二初明占二明察初又二初總示占法二別示果報今初若未來世佛諸弟子於三世中所受果報欲決疑意者應當三擲此第三輪相占計合數依數觀之以定善惡二別示果報三初標徵二詳列三結指今初如是所觀三世果報善惡之相有一百八十九種何等為一百八十九種依輪三擲總計共有一百八十九種差別隨其所現一種數相用決果報善惡也二詳列三初有百六十數明現世果報二有十一數明過去果報三有十八數明未來果報今初一者求上乘得不退二者所求果現當證三者求中乘得不退四者求下乘得不退五者求神通得成就六者修四梵得成就慈悲喜捨七者修世禪得成就根本四禪八者所欲受得妙戒九者所曾受得戒具十者求上乘未住信十一者求中乘未住信十二者求下乘未住信十三者所觀人為善友十四者隨所聞是正法十五者所觀人為惡友十六者隨所聞非正教十七者所觀人有實德十八者所觀人無實德十九者所觀義不錯謬二十者所觀義是錯謬二十一者有所誦不錯謬二十二者有所誦是錯謬二十三者所修行不錯謬二十四者所見聞是善相二十五者有所證為真實二十六者有所學是錯謬二十七者所見聞非善相二十八者有所證非正法二十九者有所獲邪神持三十者所能説邪智辨三十一者所玄知非人力謂妖鬼通非道眼也三十二者應先習觀智道三十三者應先習禪定道三十四者觀所學無障礙三十五者觀所學是所宜三十六者觀所學非所宜三十七者觀所學是宿習三十八者觀所學非宿習三十九者觀所學善增長四十者觀所學方便少四十一者觀所學無進趣四十二者所求果現未得四十三者求出家當得去四十四者求聞法得教示四十五者求經卷得讀誦四十六者觀所作是魔事四十七者觀所作事成就四十八者觀所作事不成四十九者求大富財盈滿五十者求官位當得獲五十一者求壽命得延年五十二者求世仙當得獲五十三者觀學問多所達五十四者觀學問少所達五十五者求師友得如意五十六者求弟子得如意五十七者求父母得如意五十八者求男女得如意五十九者求妻妾得如意六十者求同伴得如意六十一者觀所慮得和合六十二者所觀人心懷恚六十三者求無恨得歡喜六十四者求和合得如意六十五者所觀人心歡喜六十六者所思人得會見六十七者所思人不復會六十八者所請喚得來集六十九者所憎惡得離之七十者所愛敬得近之七十一者觀欲聚得和集七十二者觀欲聚不和集七十三者所請喚不得來七十四者所期人必當至七十五者所期人住不來七十六者所觀人得安吉七十七者所觀人不安吉七十八者所觀人已無身七十九者所望見得覩之八十者所求覓得見之八十一者求所聞得吉語八十二者所求見不如意八十三者觀所疑即為實八十四者觀所疑為不實八十五者所觀人不和合八十六者求佛事當得獲八十七者求供具當得獲八十八者求資生得如意八十九者求資生少得獲九十者有所求皆當得九十一者有所求皆不得九十二者有所求少得獲九十三者有所求得如意九十四者有所求速當得九十五者有所求久當得九十六者有所求而損失九十七者有所求得吉利九十八者有所求而受苦九十九者觀所失求當得一百者觀所失求不得一百一者觀所失自還得一百二者求離厄得脫難一百三者求離病得除愈一百四者觀所去無障難一百五者觀所去有障難一百六者觀所住得安止一百七者觀所住不得安一百八者所向處得安快一百九者所向處有厄難一百一十者所向處為魔網一百一十一者所向處難開化一百一十二者所向處可開化一百一十三者所向處自獲利一百一十四者所遊路無惱害一百一十五者所遊路有惱害一百一十六者君民惡飢饉起一百一十七者君民惡多疾疫一百一十八者君民好國豐樂一百一十九者君無道國災亂一百二十者君修德災亂滅一百二十一者君行惡國將破一百二十二者君修善國還立一百二十三者觀所避得度難一百二十四者觀所避不脫難一百二十五者所住處衆安隱一百二十六者所住處有障難一百二十七者所依聚衆不安一百二十八者間靜處無諸難一百二十九者觀怪異無損害一百三十者觀怪異有損害一百三十一者觀怪異精進安一百三十二者觀所夢無損害一百三十三者觀所夢有損害一百三十四者觀所夢精進安一百三十五者觀所夢為吉利一百三十六者觀障亂速得離一百三十七者觀障難漸得離一百三十八者觀障亂不得離一百三十九者觀障亂一心除一百四十者觀所難速得脫一百四十一者觀所難久得脫一百四十二者觀所難受衰惱一百四十三者觀所難精進脫一百四十四者觀所難命當盡一百四十五者觀所患大不調一百四十六者觀所患非人惱一百四十七者觀所患合非人一百四十八者觀所患可療治一百四十九者觀所患難療治一百五十者觀所患精進差一百五十一者觀所患久長苦一百五十二者觀所患自當差一百五十三者觀所患向醫堪能治一百五十四者觀所療是對治一百五十五者所服藥當得力一百五十六者觀所患得除愈一百五十七者所向醫不能治一百五十八者觀所療非對治一百五十九者所服藥不得力一百六十者觀所患命當盡二有十一數明過去果報一百六十一者從地獄道中來一百六十二者從畜生道中來一百六十三者從餓鬼道中來一百六十四者從阿修羅道中來一百六十五者從人道中而來一百六十六者從天道中而來一百六十七者從在家中而來一百六十八者從出家中而來一百六十九者曾值佛供養來一百七十者曾親供養賢聖來一百七十一者曾得聞深法來三有十八數明未來果報一百七十二者捨身已入地獄一百七十三者捨身已作畜生一百七十四者捨身已作餓鬼一百七十五者捨身已作阿修羅一百七十六者捨身已生人道一百七十七者捨身已為人王一百七十八者捨身已生天道一百七十九者捨身已為天王一百八十者捨身已聞深法一百八十一者捨身已得出家一百八十二者捨身已值聖僧一百八十三者捨身已生兜率天一百八十四者捨身已生淨佛國一百八十五者捨身已尋見佛一百八十六者捨身已住下乘一百八十七者捨身已住中乘一百八十八者捨身已獲果證一百八十九者捨身已入上乘二詳列竟三結指善男子是名一百八十九種善惡果報差別之相初明占竟二明察如此占法隨心所觀主念之事若數合與意相當者無有乖錯若其所擲所合之數數與心所觀主念之事不相當者謂不至心名為虗謬其有三擲而皆無所見者此人則名已得無所有也但能至心無不相當有不相當秖因不至心耳問若是已得無所有人豈有疑惑而待占耶答俱解脫人得無生智則不待占慧解脫人但得盡智設遇障緣仍能暫退故須占察也如佛在世有一羅漢將證頻退至第七返便自斷命而入涅槃佛亦不能勸諭令止故知三世果報雖皆虗妄翳苟未盡空華歷然執之則墮邪常撥之則為斷見悟之則緣生無性無性緣生當下皆即事事無礙法界矣初明自占竟二明為他二初自欲觀他二受他求請今初復次善男子若自發意觀於他人所受果報事亦同爾一切父母親緣師徒同學若存若亡欲知各各三世果報皆可至心代為占察也二受他求請又二初明如法二明不應今初若有他人不能自占而來求請欲使占者應當籌量觀察自心不貪世間內意清淨然後乃可如上歸敬修行供養至心發願而為占察二明不應又二初斥其妨道二明其虗謬今初不應貪求世間名利如行師道以自妨亂如行師道謂如世間卜相等師行邪道也邪人行正法正法亦成邪故二明其虗謬若內心不清淨者設令占察而不相當但為虗謬耳既涉貪求決無感應大士所立妙法斷不可假借也二詳示占法竟三勸修至心復次若未來世諸衆生等一切所占不獲吉善所求不得種種憂慮逼惱怖懼時應當晝夜常勤誦念我之名字若能至心者所占則吉所求皆獲現離衰惱占雖不吉若能至心稱名亦可轉禍為福也準此則所占雖吉若恣情放逸不更修善亦當不久還受衰惱矣噫不依一實境界修二種觀證無生忍寧免三世果報哉初示占察法竟
